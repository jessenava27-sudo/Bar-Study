<title>MBE Study Tracker — Bar Prep 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0f1e35; --navy-mid: #162a47; --navy-light: #1e3a5f;
  --gold: #c9960a; --gold-light: #f0c040; --gold-pale: #fdf3d0;
  --cream: #faf7f0; --cream-dark: #f0ebe0;
  --ink: #1a1612; --ink-mid: #3d3228; --ink-soft: #6b5f50;
  --white: #ffffff;
  --green: #2e7d32; --green-pale: #e8f5e9;
  --red: #c62828; --red-pale: #ffebee;
  --orange: #e65100; --orange-pale: #fff3e0;
  --blue-pale: #e3f2fd; --purple-pale: #f3e5f5; --purple: #7b1fa2;
  --border: #ddd5c8; --shadow: rgba(15,30,53,0.12);
  --radius: 10px; --radius-lg: 16px;
}
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.6; }

/* HEADER */
#header { display: none; background: var(--navy); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
#header-inner { max-width: 1400px; margin: 0 auto; padding: 14px 28px; display: flex; align-items: center; gap: 24px; }
#header h1 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--white); white-space: nowrap; }
#header h1 span { color: var(--gold-light); }
.nav-tabs { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }
.nav-tab { padding: 7px 16px; border-radius: 8px; background: transparent; border: 1px solid transparent; color: rgba(255,255,255,0.55); font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.nav-tab:hover { background: rgba(255,255,255,0.08); color: var(--white); }
.nav-tab.active { background: var(--gold); color: var(--navy); border-color: var(--gold); }
.july-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; background: rgba(201,150,10,0.15); border: 1px solid var(--gold); color: var(--gold-light); padding: 5px 12px; border-radius: 20px; white-space: nowrap; letter-spacing: 1px; }

/* MAIN */
#main { max-width: 1400px; margin: 0 auto; padding: 28px; }
.page { display: none; }
.page.active { display: block; }

/* CARDS */
.card { background: var(--white); border-radius: var(--radius-lg); box-shadow: 0 2px 16px var(--shadow); overflow: hidden; }
.card-header { background: var(--navy); padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
.card-header h2 { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--white); font-weight: 700; }
.card-header .icon { font-size: 16px; }
.card-body { padding: 20px; }

/* DASHBOARD */
.dash-grid { display: grid; grid-template-columns: 340px 1fr; gap: 24px; }
.dash-left { display: flex; flex-direction: column; gap: 20px; }
.dash-right { display: flex; flex-direction: column; gap: 20px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-box { background: var(--cream); border-radius: var(--radius); padding: 14px; text-align: center; border: 1px solid var(--border); }
.stat-num { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; color: var(--navy); line-height: 1; }
.stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-soft); margin-top: 4px; }
.stat-box.highlight .stat-num { color: var(--gold); }
.stat-box.green .stat-num { color: var(--green); }
.progress-section { margin-top: 16px; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; margin-bottom: 6px; }
.progress-bar { height: 8px; background: var(--cream-dark); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.progress-fill.mastered { background: var(--green); }
.progress-fill.reviewed { background: var(--gold); }
.progress-fill.practice { background: var(--orange); }
.subject-table { width: 100%; border-collapse: collapse; }
.subject-table th { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--ink-soft); text-align: left; padding: 6px 8px; border-bottom: 2px solid var(--border); }
.subject-table th:not(:first-child) { text-align: center; }
.subject-table td { padding: 9px 8px; border-bottom: 1px solid var(--cream-dark); font-size: 13px; }
.subject-table td:not(:first-child) { text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
.subject-table tr:last-child td { border-bottom: none; }
.subject-table tr:hover td { background: var(--cream); }
.topic-name { font-weight: 600; color: var(--navy); }
.subtopic-name { font-size: 12px; color: var(--ink-mid); padding-left: 16px !important; }
.subtopic-name::before { content: '↳ '; color: var(--ink-soft); font-size: 10px; }
.pct-pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
.pct-high { background: var(--green-pale); color: var(--green); }
.pct-mid  { background: var(--orange-pale); color: var(--orange); }
.pct-low  { background: var(--red-pale); color: var(--red); }
.pct-none { background: var(--cream-dark); color: var(--ink-soft); }
.activity-list { display: flex; flex-direction: column; gap: 8px; }
.activity-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 10px 12px; background: var(--cream); border-radius: var(--radius); border-left: 3px solid var(--border); }
.activity-item.mastered { border-left-color: var(--green); }
.activity-item.practice { border-left-color: var(--orange); }
.activity-item.reviewed { border-left-color: var(--gold); }
.activity-topic { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-soft); }
.activity-sub { font-size: 12px; font-weight: 600; color: var(--ink); margin-top: 2px; }

/* CONTROLS */
.log-controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
.search-box { flex: 1; min-width: 200px; padding: 10px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; background: var(--white); color: var(--ink); outline: none; transition: border-color 0.2s; }
.search-box:focus { border-color: var(--navy); }
select.filter-select { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: var(--white); color: var(--ink); cursor: pointer; outline: none; }
select.filter-select:focus { border-color: var(--navy); }
.btn { padding: 10px 20px; border-radius: var(--radius); font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer; border: none; transition: all 0.2s; white-space: nowrap; }
.btn-primary { background: var(--navy); color: var(--white); }
.btn-primary:hover { background: var(--navy-light); transform: translateY(-1px); }
.btn-gold { background: var(--gold); color: var(--navy); }
.btn-gold:hover { background: var(--gold-light); }
.btn-sm { padding: 6px 12px; font-size: 10px; }
.btn-ghost { background: transparent; color: var(--navy); border: 1.5px solid var(--border); }
.btn-ghost:hover { border-color: var(--navy); background: var(--cream); }
.btn-danger { background: transparent; color: var(--red); border: 1.5px solid var(--red); }
.btn-danger:hover { background: var(--red-pale); }
.results-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-soft); padding: 8px 0; margin-bottom: 4px; }

/* QUESTION CARDS */
.question-card { background: var(--white); border-radius: var(--radius-lg); box-shadow: 0 2px 12px var(--shadow); margin-bottom: 16px; overflow: hidden; border: 1.5px solid transparent; transition: box-shadow 0.2s; }
.question-card:hover { box-shadow: 0 4px 24px rgba(15,30,53,0.16); }
.question-card.mastered { border-color: rgba(46,125,50,0.3); }
.question-card.more-practice { border-color: rgba(230,81,0,0.3); }
.qcard-header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; background: var(--navy); cursor: pointer; user-select: none; }
.qcard-num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; color: var(--gold-light); white-space: nowrap; }
.qcard-topic { font-size: 12px; font-weight: 600; color: var(--white); }
.qcard-subtopic { font-size: 11px; color: rgba(255,255,255,0.6); font-style: italic; }
.qcard-badges { display: flex; gap: 6px; align-items: center; }
.status-badge { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
.badge-not-started { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
.badge-reviewed { background: rgba(201,150,10,0.3); color: var(--gold-light); }
.badge-practice { background: rgba(230,81,0,0.3); color: #ff8a50; }
.badge-mastered { background: rgba(46,125,50,0.35); color: #81c784; }
.chevron { color: rgba(255,255,255,0.4); font-size: 12px; transition: transform 0.2s; }
.qcard-header.open .chevron { transform: rotate(180deg); }
.qcard-body { display: none; }
.qcard-body.open { display: block; }
.qcard-section { padding: 16px 20px; border-bottom: 1px solid var(--cream-dark); }
.qcard-section:last-child { border-bottom: none; }
.section-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-soft); margin-bottom: 8px; }
.question-text { font-size: 13.5px; line-height: 1.75; white-space: pre-wrap; color: var(--ink); }
.choices-block { display: flex; flex-direction: column; gap: 8px; }
.choice-row { display: flex; gap: 10px; align-items: flex-start; padding: 9px 12px; border-radius: var(--radius); background: var(--cream); border: 1px solid var(--border); font-size: 13px; line-height: 1.5; }
.choice-letter { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; color: var(--navy); min-width: 20px; }
.answer-reveal { display: none; background: var(--green-pale); border: 1.5px solid var(--green); border-radius: var(--radius); padding: 10px 16px; font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 18px; color: var(--green); letter-spacing: 2px; }
.answer-reveal.shown { display: block; }
.rule-box { background: var(--cream); border-left: 3px solid var(--gold); padding: 12px 14px; border-radius: 0 var(--radius) var(--radius) 0; font-size: 13px; line-height: 1.65; }
.takeaway-box { background: var(--blue-pale); border-left: 3px solid #1976d2; padding: 12px 14px; border-radius: 0 var(--radius) var(--radius) 0; font-size: 13px; line-height: 1.65; }
.notes-textarea { width: 100%; min-height: 80px; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; resize: vertical; background: var(--cream); color: var(--ink); outline: none; }
.notes-textarea:focus { border-color: var(--navy); }
.qcard-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 14px 20px; background: var(--cream); border-top: 1px solid var(--border); }
.status-select { padding: 7px 12px; border: 1.5px solid var(--border); border-radius: var(--radius); font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: var(--white); color: var(--ink); cursor: pointer; outline: none; }
.mastered-toggle { display: flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink-soft); cursor: pointer; padding: 7px 12px; border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--white); transition: all 0.2s; }
.mastered-toggle:hover { border-color: var(--green); }
.mastered-toggle.active { background: var(--green-pale); border-color: var(--green); color: var(--green); }

/* FLASHCARD MODE */
.flashcard-controls { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
.fc-stats { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-soft); margin-left: auto; }
.flashcard-area { max-width: 720px; margin: 0 auto; }
.flashcard { background: var(--white); border-radius: var(--radius-lg); box-shadow: 0 8px 40px rgba(15,30,53,0.15); min-height: 380px; display: flex; flex-direction: column; overflow: hidden; }
.fc-topic-bar { background: var(--navy); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
.fc-topic { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold-light); }
.fc-num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.4); }
.fc-body { padding: 32px 36px; flex: 1; }
.fc-question { font-size: 15px; line-height: 1.8; color: var(--ink); white-space: pre-wrap; margin-bottom: 24px; }
.fc-choices { display: flex; flex-direction: column; gap: 8px; }
.fc-choice { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 13px; cursor: pointer; transition: all 0.15s; display: flex; gap: 10px; }
.fc-choice:hover { border-color: var(--navy); background: var(--cream); }
.fc-choice.selected-correct { background: var(--green-pale); border-color: var(--green); }
.fc-choice.selected-wrong { background: var(--red-pale); border-color: var(--red); }
.fc-choice.reveal-correct { background: var(--green-pale); border-color: var(--green); }
.fc-answer-area { padding: 20px 36px 28px; display: none; }
.fc-answer-area.shown { display: block; }
.fc-correct-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--green); margin-bottom: 10px; }
.fc-rule { font-size: 13px; line-height: 1.65; color: var(--ink-mid); margin-bottom: 10px; }
.fc-takeaway { font-size: 13px; font-style: italic; color: var(--navy); font-weight: 600; padding: 10px 14px; background: var(--gold-pale); border-radius: var(--radius); border-left: 3px solid var(--gold); }
.fc-footer { padding: 16px 24px; background: var(--cream); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.fc-progress-bar { flex: 1; height: 6px; background: var(--cream-dark); border-radius: 3px; overflow: hidden; }
.fc-progress-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.4s; }
.fc-complete { text-align: center; padding: 60px 36px; }
.fc-complete h2 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--navy); margin-bottom: 12px; }
.fc-complete p { color: var(--ink-soft); margin-bottom: 24px; }
.fc-score { font-family: 'Playfair Display', serif; font-size: 60px; font-weight: 900; color: var(--gold); line-height: 1; }
.fc-score-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-soft); margin-top: 4px; }

/* RULES TAB */
.rules-grid { display: grid; grid-template-columns: 300px 1fr; gap: 24px; align-items: start; }
.rule-sidebar { display: flex; flex-direction: column; gap: 12px; position: sticky; top: 90px; max-height: calc(100vh - 110px); overflow-y: auto; }
.rule-topic-group { background: var(--white); border-radius: var(--radius-lg); box-shadow: 0 2px 12px var(--shadow); overflow: hidden; }
.rule-topic-header { background: var(--navy); padding: 11px 16px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--gold-light); font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.rule-topic-list { padding: 6px 0; }
.rule-topic-item { padding: 8px 16px; font-size: 12px; cursor: pointer; transition: background 0.15s; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid transparent; }
.rule-topic-item:hover { background: var(--cream); }
.rule-topic-item.active { background: var(--cream); border-left-color: var(--gold); font-weight: 600; color: var(--navy); }
.rule-count-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ink-soft); }
.rule-comfort-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.dot-strong { background: var(--green); }
.dot-ok { background: var(--gold); }
.dot-weak { background: var(--orange); }
.dot-new { background: var(--border); }
.rule-main { display: flex; flex-direction: column; gap: 16px; }
.rule-card { background: var(--white); border-radius: var(--radius-lg); box-shadow: 0 2px 12px var(--shadow); overflow: hidden; border-left: 4px solid var(--border); transition: box-shadow 0.2s; }
.rule-card:hover { box-shadow: 0 4px 20px rgba(15,30,53,0.14); }
.rule-card.comfort-strong { border-left-color: var(--green); }
.rule-card.comfort-ok { border-left-color: var(--gold); }
.rule-card.comfort-weak { border-left-color: var(--orange); }
.rule-card.comfort-new { border-left-color: var(--border); }
.rule-card-header { padding: 14px 20px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; background: var(--cream); border-bottom: 1px solid var(--border); }
.rule-card-meta { flex: 1; }
.rule-card-topic { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--ink-soft); margin-bottom: 4px; }
.rule-card-subtopic { font-size: 13px; font-weight: 700; color: var(--navy); }
.rule-card-body { padding: 16px 20px; }
.rule-text { font-size: 13.5px; line-height: 1.7; color: var(--ink); margin-bottom: 12px; }
.takeaway-text { font-size: 13px; font-style: italic; color: var(--navy); padding: 10px 14px; background: var(--gold-pale); border-radius: var(--radius); border-left: 3px solid var(--gold); line-height: 1.6; }
.rule-card-footer { padding: 12px 20px; background: var(--cream); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.comfort-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-soft); }
.comfort-btns { display: flex; gap: 6px; }
.comfort-btn { padding: 5px 12px; border-radius: 20px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--white); transition: all 0.15s; }
.comfort-btn:hover { transform: translateY(-1px); }
.comfort-btn.strong { border-color: var(--green); color: var(--green); }
.comfort-btn.strong.active { background: var(--green); color: var(--white); }
.comfort-btn.ok { border-color: var(--gold); color: var(--gold); }
.comfort-btn.ok.active { background: var(--gold); color: var(--navy); }
.comfort-btn.weak { border-color: var(--orange); color: var(--orange); }
.comfort-btn.weak.active { background: var(--orange); color: var(--white); }
.rule-fc-btn { margin-left: auto; }
.rule-fc-card { background: var(--white); border-radius: var(--radius-lg); box-shadow: 0 8px 40px rgba(15,30,53,0.15); max-width: 720px; margin: 0 auto; overflow: hidden; }
.rfc-front { padding: 40px 40px 28px; min-height: 220px; display: flex; flex-direction: column; justify-content: center; }
.rfc-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-soft); margin-bottom: 16px; }
.rfc-question { font-family: 'Playfair Display', serif; font-size: 18px; line-height: 1.6; color: var(--navy); }
.rfc-back { padding: 28px 40px; border-top: 1px solid var(--border); display: none; background: var(--cream); }
.rfc-back.shown { display: block; }
.rfc-answer-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--green); margin-bottom: 12px; }
.rfc-answer-text { font-size: 14px; line-height: 1.7; color: var(--ink); margin-bottom: 14px; }
.rfc-takeaway { font-size: 13px; font-style: italic; padding: 10px 14px; background: var(--gold-pale); border-left: 3px solid var(--gold); border-radius: var(--radius); }
.rfc-footer { padding: 16px 24px; background: var(--cream-dark); border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: center; align-items: center; }

/* UPLOAD */
.upload-zone { border: 2px dashed var(--border); border-radius: var(--radius-lg); padding: 40px 30px; text-align: center; background: var(--white); cursor: pointer; transition: all 0.2s; }
