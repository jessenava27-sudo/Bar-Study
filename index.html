 a $2,000 security deposit with the landlord. The deposithad been required, however, for the express purpose (as stated in the lease) of covering any damage to the leasedproperty except ordinary wear and tear. The only such damage occuring during the tenant's occupancy was thesmashed window. The window company's $2,000 bill for the window replacement is wholly unpaid.Upon vacating the building, the tenant mailed a $1,000 check to the window company bearing on its face the followingconspicuous notation: \"This check is in full and final satisfaction of your $2,000 window replacement bill.\" Withoutnoticing this notation, the window company cashed the check and now sues the tenant for the $1,000 difference.If the tenant's only defense is accord and satisfaction, is the tenant likely to prevail?\n\nD)  Yes, because the window company failed to write a reservation-of-rights notation on the checkbefore cashing it.", "correct": "B", "rule": "B is correct. The tenant's offer for an accord and satisfaction was not enforceable because it lacked consideration.A is incorrect. The notation on the check was sufficiently conspicuous to put the window company on notice of itsexistence.C is incorrect. An accord and satisfaction is not enforceable unless the debt is genuinely in dispute.D is incorrect. As explained above, the debt was not genuinely in dispute.", "takeaway": "The tenant's offer for an accord and satisfaction was not enforceable because it lacked consideration.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1326", "topic": "Contracts", "subtopic": "Remedies", "question": "A homeowner and a contractor entered into a contract for the construction of a home for $300,000. The contractorwas to earn a profit of $10,000 for the job. After the contractor had spent $45,000 on labor and materials, including$5,000 on oak flooring not yet installed, the homeowner informed the contractor that the homeowner had lost his joband could not pay for any services. Th because the contract was for his benefit.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Contracts", "subtopic": "Revocation", "question": "A small business owner decided to retire, so she offered her long-time employee a chance to buy the business for $1 million. She promised in writing to keep the offer open to him for 90 days and to give him enough time to secure financing once he accepted the offer. Over the next few days, the employee cashed out all his retirement accounts and took a second mortgage on his home to raise the funds to purchase the business. When he approached the business owner to discuss the details of the sale, she said that she changed her mind and was revoking her offer because she did not want to retire after all.", "choices": "A)  Yes, because it was an offer that could be revoked at will.\n\nB)  No, because the owner created an option contract by promising to keep the offer open for 90 days.\n\nC)  No, because the employee detrimentally relied on the offer.\n\nD)  No, because the offer constitutes a merchant's firm offer.", "correct": "A", "rule": "The owner's revocation of her offer was proper because the offer could be revoked at will. Generally, offers can be revoked at will by the offeror, even if she has promised not to revoke for a certain period of time. There are limitations on the offeror's power to revoke, but none of those exceptions apply in this case. (B) is incorrect because an option contract requires that the offeree give consideration for the promise by the offeror to keep the offer open, and no consideration is indicated by the facts. (C) is also incorrect. Detrimental reliance can limit an offeror's power to revoke where the offeror could reasonably expect that the offeree would rely to his detriment on the offer, an", "takeaway": "The owner's revocation of her offer was proper because the offer could be revoked at will.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Contracts", "subtopic": "Who will prevail?", "question": "A downtown department store engaged an electrician to service all electrical appliances sold by the store for a flat fee of $5,000 per month. Under a written contract signed by both parties, the store was responsible for pickup and delivery of the appliances to be repaired and the billing for the work. By its terms, the contract would continue until either party gave 180 days' written notice of its intent to terminate. Several months ago the electrician informed the store that he was losing money on the deal and was in financial trouble. He requested in good faith that the fee for the next three months be increased by $1,000 and that this increase be paid to a local bank to help pay off a loan that the bank had made to the electrician. The store orally agreed to so modify the original contract. However, the store did not pay the bank and now the bank is suing the store for $3,000.", "choices": "A)  The store, because there was no consideration to support the promise to pay the bank.\n\nB)  The store, because the bank is only an incidental beneficiary of the modified contract between the store and the electrician.\n\nC)  The bank, because it is an intended creditor beneficiary of the modified contract between the store and the electrician.\n\nD)  The bank, because the electrician exercised good faith in requesting the modification regarding the payment to the bank.", "correct": "A", "rule": "The store will prevail, because there was no consideration to support its promise to pay the bank the additional $1,000 per month. This question looks like it concerns third-party beneficiaries, but it actually presents a consideration issue. Generally, there must be consideration for modification of a contract, and a promise to perform an act that a party is already obliged to do is not sufficient consideration (the \"preexisting legal duty\" rule). Here, the electrician is promising to do exactly what f watches delivered by the manufacturer to the department store in July of that year. At trial, the manufacturer introduced evidence regarding the department store's failure to pay for the watches. In addition, it introduced evidence that the department store failed to pay for a shipment of necklaces, also delivered that July pursuant to a separate contract. At the close of the manufacturer's case, the department store introduced evidence showing that both the watches and the jewelry were defective. The jury returned a verdict for the manufacturer, awarding the manufacturer damages for breach of both contracts. The manufacturer then immediately moved to amend its complaint to conform to the evidence introduced at trial. Should the court allow the amendment?", "choices": "A)  Yes, because the department store impliedly consented to the introduction of the evidence.\n\nB)  Yes, because the parties entered into the contracts at approximately the same time.\n\nC)  No, because the motion should have been made before the verdict was rendered.\n\nD)  No, because the defendant must have had knowledge of the claim when the complaint was served.", "correct": "A", "rule": "The court should allow the amendment. An issue not raised by the pleadings is treated as if raised in the pleadings if it is tried by the parties' express or implied consent. In such a case, a party may move-at any time, even after judgment-to amend the pleadings to conform them to the evidence and to raise the unpleaded issue. Here, the department store impliedly consented to the introduction of evidence relating to the jewelry contract. Not only did it fail to object to the evidence, it introduced evidence to show that the jewelry was defective. Thus, the manufacturer was entitled to move to amend its complaint to conform to the evidence introduced at trial. (B) is incorrect because the re", "takeaway": "The court should allow the amendment.", "notes": "Any evidence that is introduced that was not in the complaint should be objected to, otherwise you are consenting to it and the other party can amend their complaint AT ANY TIME accordingly. ", "status": "More Practice Needed", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Trial and Pre-Trial Motions", "question": "A consumer purchased a luxury automobile from a dealer on credit. After the consumer failed to make a number of the required payments, the dealer filed a civil action against the consumer in federal district court to recover the balance due on the account. The dealer properly served process on the consumer. Several months passed, and the consumer did not file any response to the complaint. The dealer then filed a motion asking the clerk of court to make an entry of default, and the clerk did so. What procedure should the dealer follow to obtain a default judgment against the consumer?", "choices": "A)  File a motion to have the clerk of court enter the default judgment, and the clerk may do so without the consumer receiving any further notice of the motion.\n\nB)  File a motion to have the clerk of court enter the default judgment, and the clerk may do so, provided the consumer receives additional notice of the motion for default judgment.\n\nC)  File a motion to have the judge enter the default judgment, and the judge may do so without the consumer receiving any further notice of the motion for default judgment.\n\nD)  File a motion to have the judge enter the default judgment, and the judge may do so, provided the consumer receives additional notice of the motion for default judgment.", "correct": "A", "rule": "The dealer should file a motion with the clerk of court. On request of the plaintiff, supported by an affidavit as to the amount due, the clerk may sign and enter judgment for that amount and costs against the defendant if: (i) the plaintiff's claim against the defaulted defendant is for a sum certain; (ii) the default was entered because the defendant failed to appear; (iii) the defaulted defendant is not an infant or incompetent person; and (iv) the damages amount requested is not greater than the amount requested in the complaint. The dealer's claim here meets these requirements, so the clerk may enter the default judgment, and no notice is required. (B) is incorrect because no further no", "takeaway": "The dealer should file a motion with the clerk of court.", "notes": "If the party has not appeared in any way, the court clerk can grant the default judgment if: 1) there is a certain sum for claim, 2) the default judgment was entered because the defendant failed to appear, and 3) the damages requested are not greater than those in the complaint. If the D has responded IN ANY WAY, the clerk cannot grant the default judgement. Instead, the judge has to do it. ", "status": "Reviewed", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Appeals", "question": "As a general rule, a notice of appeal must be filed with the district court within ____ days from the entry of judgment.", "choices": "A)  60\n\nB)  30\n\nC)  90\n\nD)  28", "correct": "B", "rule": "Under Rules 3 and 4 of the Federal Rules of Appellate Procedure, a party has 30 days from the entry of judgment to file a notice of appeal with the district court. The filing period is extended to 60 days when the United States is a party to the action.", "takeaway": "Under Rules 3 and 4 of the Federal Rules of Appellate Procedure, a party has 30 days from the entry of judgment to file a notice of appeal with the district court.", "notes": "", "status": "Reviewed", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Preclusion", "question": "Once a final judgment on the merits has been rendered on a particular cause of action, the claimant is prevented from asserting the same cause of action in a later lawsuit by the doctrine of claim preclusion (res judicata). When the claimant won the earlier lawsuit, the claim is said to be:", "choices": "A)  Barred by the prior judgment\n\nB)  Either merged into or barred by the prior judgment\n\nC)  Merged into the prior judgment\n\nD)  n/a", "correct": "C", "rule": "Although both merger and bar are used to indicate that claim preclusion (res judicata) is in effect, where the claimant won the earlier lawsuit, the claim is said to be merged into the prior judgment. Where the defendant won the earlier lawsuit, the claim is said to be barred by the prior judgment. Because the question specifically states that the claimant won the earlier suit, to say that the claim either merged into or is barred by the prior judgment is incorrect.", "takeaway": "Although both merger and bar are used to indicate that claim preclusion (res judicata) is in effect, where the claimant won the earlier lawsuit, the claim is said to be merged into the prior judgment.", "notes": "Merged = claimant won judgment\nBarred = defendant won judgment\n\nThe key distinction: bar applies when you lost or the case was dismissed, blocking you from trying again. Merger applies when you won, absorbing your claim into the judgment so you can't sue again for more. Both directions — win or lose — you're done with that cause of action.", "status": "More Practice Needed", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Preclusion", "question": "A taxi crashed into a telephone pole. The taxi's passenger commenced a negligence action against the taxi driver, properly serving the taxi driver with the summons and complaint. The taxi driver, being an independent contractor with no right to indemnity from the taxi's owner, turned the summons and complaint over to his insurance company. After trial, the jury returned a verdict in favor of the passenger, finding that the taxi driver's negligence was the sole cause of the crash. The passenger then commenced a second action, this time against the owner of the taxi. The owner also had no right of indemnity from the taxi driver. The passenger alleged that the taxi driver's negligence was the sole cause of the crash and that the owner was vicariously liable. The passenger immediately moved for partial summary judgment against the owner based on the finding of the taxi driver's negligence in the prior action. If the court denies the motion, what is the most likely reason?", "choices": "A)  Claim preclusion bars the passenger's claim against the owner.\n\nB)  The taxi owner is not precluded from litigating the issue of whether the taxi driver was negligent.\n\nC)  The passenger waived her right to sue the owner by not joining the owner as a defendant in the first action.\n\nD)  The taxi driver is a necessary and indispensable party to the second action.", "correct": "B", "rule": "The taxi owner is not precluded from litigating that issue. For a party to be bound by issue preclusion, (i) there must have been a final judgment; (ii) the issue must have been actually litigated and determined; (iii) the issue must have been essential to the judgment; and (iv) the party to be bound by the prior judgment must have been a party to the prior action or in privity with a party to the prior action. Here, it is the last element that is missing. The taxi owner was not a party to the prior action, and there is no indication that the taxi owner was in privity with the taxi driver. (A) is incorrect for a similar reason. Claim preclusion applies when the earlier case and the later cas", "takeaway": "The taxi owner is not precluded from litigating that issue.", "notes": "For issue preclusion to apply, the parties must have been in privity. Here, the employee and the owner were not in privity. If there were indemnity between the employee and the owner, there would likely be privity because their interests would have been aligned. ", "status": "Reviewed", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Preclusion", "question": "A corporation operated several factories that were emitting toxic chemicals into the air. The Environmental Protection Agency (\"EPA\") sued the corporation in federal court for violation of several environmental laws, and the jury found in favor of the EPA. One of the corporation's factories was located near a town, and some residents believed that their health had been harmed by the factory's emissions. One resident sued the corporation in federal district court, alleging damages stemming from the factory's violation of the environmental laws. The resident asserts issue preclusion (collateral estoppel) to establish the factory's violation of the environmental laws. If the court permits the resident to use issue preclusion to establish the violation, what is the likely reason?", "choices": "A)  A nonparty in the first case is always allowed to use issue preclusion (collateral estoppel) offensively or defensively against someone who was a party in the first case.\n\nB)  There was a valid, final judgment on the merits in the first case, and the same cause of action is involved in the resident's lawsuit.\n\nC)  The court determined that it is fair and equitable to allow the resident to use issue preclusion (collateral estoppel) offensively.\n\nD)  A party can use issue preclusion (collateral estoppel) offensively when the defendant has been found to have violated a federal law.", "correct": "C", "rule": "If the court permits the resident to use issue preclusion (collateral estoppel) to establish the violation, it is likely because the court determined that it is fair and equitable for the resident to do so. Under the traditional mutuality rule, only someone who was a party in the previous case can use issue preclusion. However, this rule has been modified to allow nonparties to use issue preclusion in certain circumstances. When a nonparty wants to use a previous judgment offensively, the court must consider whether it would be fair and equitable to allow the nonparty to do so. (A) is therefore incorrect because nonparties are not always allowed to use issue preclusion offensively or defensi", "takeaway": "If the court permits the resident to use issue preclusion (collateral estoppel) to establish the violation, it is likely because the court determined that it is fair and equitable for the resident to do so.", "notes": "Non-mutual Offensive Collateral Estoppel Fairness Factors: 1) Party to be bound by decision in Case 2 had full and fair opportunity to litigate the issue in Case 1, 2) The party to be bound had proper incentive to litigate the issue in Case 1, 3) Whether the party asserting the preclusion could have easily joined Case 1 (e.g., if they could have easily joined Case 1, the court may not allow you to use the preclusion offensively), 4) There have been no inconsistent issues on the findings (e.g., multiple cases about someone's negligence and in some they are found negligent and in others they are not, then the court in Case 2 would likely not allow for offensive use of the preclusion).  ", "status": "Reviewed", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Preclusion", "question": "A citizen of State A ran a red light at a traffic intersection, striking a pedestrian, a citizen of State B, who was lawfully in the middle of the crosswalk at the time. The accident occurred in State B. Despite the pedestrian's extensive injuries, the driver was more concerned with the damage to his new automobile. The driver sued the pedestrian in a state court of State B for $90,000 for damage to his car. The driver promptly lost, and then decided to bring suit in federal court, claiming diversity jurisdiction. May the driver successfully bring his claim in federal court?", "choices": "A)  Yes, because the requirements for diversity jurisdiction are met.\n\nB)  Yes, because a state court decision does not bind a federal court.\n\nC)  No, because all claims merged with the state court case.\n\nD)  No, because the claim is barred.", "correct": "D", "rule": "The driver will not be successful because the claim is barred. Bar occurs when a plaintiff loses. The adverse judgment \"bars\" the plaintiff from relitigating the cause of action. (A) is incorrect because, although the requirements of diversity jurisdiction are met, the driver will not be successful because the claim is barred, as discussed above. (B) is incorrect. Federal courts will give the same preclusive effect of a state court decision that the state that issued it would; e.g., here, a federal court would give the State B state court decision the same preclusive effect that another State B state court would. (C) is incorrect. Merger occurs when a plaintiff wins; his cause of action is said to \"merge\" into the judgment such that he cannot relitigate the cause of action later.", "takeaway": "The driver will not be successful because the claim is barred.", "notes": "Merged = claimant won judgment\nBarred = defendant won judgment\n\nThe key distinction: bar applies when you lost or the case was dismissed, blocking you from trying again. Merger applies when you won, absorbing your claim into the judgment so you can't sue again for more. Both directions — win or lose — you're done with that cause of action.", "status": "Reviewed", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Permissive/Compulsory Claims", "question": "A State A book dealer sold a number of rare comic books to a State B collector for $90,000. The collector paid $10,000 upon delivery and agreed to pay the balance in eight monthly installments of $10,000 each. Two weeks after the sale, the dealer and the collector were involved in an automobile accident that was unrelated to the comic book transaction. The dealer filed a negligence action against the collector in federal district court to recover $100,000 for injuries incurred in the automobile accident. If the collector wishes to assert a $90,000 fraud claim against the dealer on the grounds that the comic books were counterfeit, may the collector assert this claim in the pending negligence action?", "choices": "A)  The collector must assert the fraud claim against the dealer in a separate action because the two claims do not arise from the same transaction or occurrence.\n\nB)  The collector will be foreclosed from asserting the fraud claim unless he asserts it as a counterclaim in the pending negligence action.\n\nC)  The collector may assert the fraud claim either as a counterclaim or in a separate lawsuit.\n\nD)  The collector may file a motion seeking leave to assert the fraud claim as a counterclaim, and the court has discretion to allow or disallow the joinder.", "correct": "C", "rule": "The collector may assert the fraud claim either as a counterclaim or in a separate lawsuit. The collector's fraud claim is a permissive counterclaim since it does not arise from the same transaction or occurrence as the dealer's claims. Therefore, the collector may assert it as a counterclaim or bring a separate lawsuit. (A) is incorrect because a defendant may assert a permissive counterclaim, assuming there is subject matter jurisdiction, even though there is no connection between it and the plaintiff's claim. (B) is incorrect because only compulsory counterclaims must be asserted. (D) is incorrect because a defendant does not have to file a motion and seek the court's permission to assert", "takeaway": "The collector may assert the fraud claim either as a counterclaim or in a separate lawsuit.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Joinder", "question": "A condo owner, a citizen of State A, hired an electrician, a citizen of State A, and a gas worker, a citizen of State B, to fix the wiring in his condo and install a new gas stove. Unfortunately, the condo burned down while they were working on it. The condo owner sued the gas worker for negligence, seeking $100,000. The gas worker files a motion to dismiss the case for failure to join the electrician, alleging that he contributed to the fire. How should the court rule?", "choices": "A)  Deny the motion and order that the electrician be joined as a permissive co-defendant.\n\nB)  Deny the motion and order that the electrician be joined as an indispensable party.\n\nC)  Deny the motion, because the electrician is not a necessary party.\n\nD)  Grant the motion, because the electrician is a necessary party but his joinder would destroy complete diversity.", "correct": "C", "rule": "The court should deny the motion. The most typical way in which compulsory joinder is raised is by a Rule 12(b) motion to dismiss for failure to join an indispensable party. To determine if the party is truly indispensable, the first step is to determine whether the absentee should be joined. One reason why an absent party should be joined is when complete relief cannot otherwise be accorded among parties. However, under the tort law in a number of states, any single joint tortfeasor may be liable for the entire wrong, making complete relief for the plaintiff possible. Another reason to join an absent party is if he has an interest in the subject matter of the suit such that, without his pre", "takeaway": "The court should deny the motion.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Pleadings", "question": "A plaintiff sued an auto manufacturer for negligence after a car accident involving the plaintiff's car that was made by the auto manufacturer. Sixty days after service of the complaint and 40 days after service of the manufacturer's answer that contained no counterclaim, the plaintiff filed a motion seeking to file an amended complaint adding a claim for strict products liability against the auto manufacturer stemming from the same incident. The statute of limitations for strict products liability claims expired one week before the motion was filed. How should the court rule on the plaintiff's motion?", "choices": "A)  Grant the motion, because every party is entitled to amend once as a matter of course.\n\nB)  Grant the motion, because the amended complaint relates back.\n\nC)  Deny the motion, because, while the motion is timely, the proposed claim is futile because the statute of limitations has run.\n\nD)  Deny the motion, because it is not timely.", "correct": "B", "rule": "The court should grant the motion. Federal Rule of Civil Procedure 15 states that leave of court (to grant motions to amend) is to be \"freely given when justice so requires.\" The rule does not provide any clear date when amendments are no longer permissible, although later amendments obviously would be less fair and less likely to be considered in the interest of justice. Additionally, for statute of limitations purposes, proposed claims may be considered to \"relate back\" to the date of the original pleading in which the claim was made under Rule 15(c). That is critical here because, although the statute of limitations for the proposed products liability claim had expired at the time the mot", "takeaway": "The court should grant the motion.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "SMJ", "question": "A plaintiff filed a civil action based on negligence against a defendant in federal district court, alleging that the defendant negligently ran a red light at an intersection and collided with the plaintiff's vehicle, causing the plaintiff's injuries. A week after the close of discovery, the plaintiff filed a motion for summary judgment on the issue of whether the defendant was negligent. With the motion, the plaintiff filed (i) his own sworn affidavit, which stated that the traffic signal was green as he entered the intersection, (ii) an affidavit of a witness who was driving the car behind him, which stated that the witness saw the entire incident and that the plaintiff's traffic signal was green as he approached and entered the intersection; and (iii) an affidavit of another witness, which stated that she saw the entire incident and that the defendant's signal had been red for several seconds before the defendant entered the intersection and was still red when the defendant entered the intersection. The defendant filed a response to the motion, noting that her answer denied negligence and further denied that her traffic signal was red, and argued that the issue of negligence and the issue of whether her traffic signal was red were in dispute, so those issues should be tried to a jury. How should the court rule on the plaintiff's motion?", "choices": "A)  Deny the motion, because whenever a defendant's pleadings deny allegations in a plaintiff's complaint, the disputed issues must be submitted to trial.\n\nB)  Deny the motion, because the defendant has no duty to produce evidence on the issue of negligence since the plaintiff has the burden of proof on that issue.\n\nC)  Grant the motion, because the plaintiff supported his motion with substantial evidence indicating that the defendant was negligent, and the defendant did not come forward with admissible evidence in rebuttal.\n\nD)  Grant the motion, because whenever a plaintiff's complaint properly states a claim for relief, a defendant may not rest on the denials in the defendant's pleading, but must produce evidence that negates the claim.", "correct": "C", "rule": "The court should grant the plaintiff's motion. If a party fails to support an assertion of fact or fails to properly address another party's assertion of fact, the court may consider the fact undisputed for purposes of the motion, grant summary judgment if appropriate, give the party an opportunity to address the fact, or issue any other appropriate order. Here, the plaintiff came forward with affidavits supporting his contention that the light was red when the defendant entered the intersection. The defendant here must counter those affidavits with her own or risk summary judgment being entered against her. (A) is incorrect because, in a summary judgment motion, a party may not rest on plea", "takeaway": "The court should grant the plaintiff's motion.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Motions", "question": "A homeowner sued a contractor in federal court for damages resulting from an unsuccessful roof repair. However, the homeowner failed to attend status conferences and failed generally to prosecute the action. As a result, the court dismissed the case with prejudice for want of prosecution. The homeowner then filed her complaint in a different federal court. In his answer the contractor asserts the affirmative defense of claim preclusion. Should the court dismiss the case?", "choices": "A)  No, because the merits of the case were not determined.\n\nB)  No, because the court erred in designating the dismissal as one with prejudice.\n\nC)  Yes, because the dismissal was with prejudice.\n\nD)  Yes, because dismissals for want of prosecution are on the merits.", "correct": "C", "rule": "The court should dismiss the case. For claim preclusion to apply, (i) the earlier judgment must be a valid, final judgment on the merits; (ii) the cases must be brought by the same claimant against the same defendant; and (iii) the same cause of action must be involved in the later suit. Under Federal Rule of Civil Procedure 41, dismissals for lack of prosecution are with prejudice and operate as an adjudication on the merits unless the court designates otherwise. As a result, the judgment has claim preclusion effect on subsequent cases between the parties. (A) is incorrect. Although the factual merits of the case were not determined, Rule 41 dictates that the judgment is on the merits unles", "takeaway": "The court should dismiss the case.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Appeals", "question": "A pedestrian sued a driver for personal injuries in federal court, properly invoking diversity of citizenship jurisdiction. In the complaint, the pedestrian alleged that the driver ran a red light and struck the pedestrian while the pedestrian was in the crosswalk. Concurrent with the accident, a police report was prepared on which the name and address of a witness to the accident was listed, but neither party requested a copy of the report from the police department. Thus, when the pedestrian submitted an interrogatory to the driver for the names and addresses of persons with knowledge of the accident known to the driver, the driver truthfully omitted the name of the witness. When asked during his deposition whether he knew of any witnesses, the driver again truthfully answered \"I don't know of any.\" At trial, the jury found for the driver. In one of the special interrogatories answered by the jury, the jury found that the driver had the green light and that the pedestrian was crossing against the light. Six months and a day after a final judgment was rendered in favor of the driver, the pedestrian's attorney was contacted by the witness, who stated that the driver ran a red light and that the pedestrian had the \"walk\" sign when he attempted to cross the road. The pedestrian's attorney immediately moved for relief from judgment based on newly discovered evidence, and the trial judge granted the motion. On appeal, what should the court do?", "choices": "A)  Affirm the trial judge's decision, because whether to deny or grant a motion for relief from judgment is strictly a matter within the trial judge's discretion.\n\nB)  Affirm the trial judge's decision, because the driver should have discovered the identity of the witness.\n\nC)  Reverse the trial judge's decision, because more than six months had passed since the judgment was rendered when the trial judge granted the motion.\n\nD)  Reverse the trial judge's decision, because the pedestrian could have discovered the witness's identity with reasonable diligence.", "correct": "D", "rule": "The court should reverse the trial judge's decision. On motion and just terms, the court may relieve a party from a final judgment or order on the following grounds: (i) mistake, inadvertence, surprise, or excusable neglect; (ii) newly discovered evidence that by due diligence could not have been discovered in time to move for a new trial; (iii) fraud, misrepresentation, or other misconduct of an adverse party; (iv) the judgment is void; (v) the judgment has been satisfied, released, or discharged; a prior judgment on which it is based has been reversed or otherwise vacated; or it is no longer equitable that the judgment should have prospective application; or (vi) any other reason justifyin", "takeaway": "The court should reverse the trial judge's decision.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Service of Process", "question": "A minivan driver from State A and a semi-truck driver from State B were involved in a serious collision on a highway in State B. The minivan driver sued the truck driver in a state court in State A for negligence, and served the truck driver with the summons and complaint via first-class mail. Although the truck driver received the documents, he failed to respond to them or appear in court. The minivan driver eventually obtained a default judgment in state court. State A's requirements for service of process are the same as the requirements under the Federal Rule of Civil Procedure. If the minivan driver seeks to enforce the State A judgment against the truck driver in State B, will the minivan driver be successful?", "choices": "A)  Yes, under the Constitution's Full Faith and Credit Clause, because a default judgment is considered \"on the merits.\"\n\nB)  Yes, under the Constitution's Full Faith and Credit Clause, because the truck driver received the summons and complaint.\n\nC)  No, because claim preclusion precludes the minivan driver from asserting two actions that involve the same parties and the same transaction and occurrence.\n\nD)  No, because the truck driver may collaterally attack the default judgment for insufficient service of process.", "correct": "D", "rule": "The minivan driver will not be successful. Default judgments that are constitutionally or procedurally defective are subject to a collateral attack and may not be enforced under the Constitution's Full Faith and Credit Clause. Generally, under the Federal Rules of Civil Procedure [Rule 4], service of process can be made by: (i) personal service, (ii) service left at the defendant's usual place of abode with one of suitable age and discretion residing therein, or (iii) service upon an authorized agent of the defendant. Alternatively, service may be made under state rules or by mail under the waiver of service provision of Rule 4(d). A collateral attack is the name used to describe a defendant", "takeaway": "The minivan driver will not be successful.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "PJ", "question": "Your client, a college student from State A, hit another car driven by a resident from State B when the client was traveling through State B. The State B driver brought an action in State B state court against the client, who has limited financial resources. You are considering filing a motion to dismiss on behalf of the client on the grounds that the State B court lacks personal jurisdiction. What is the best argument to support the motion to dismiss?", "choices": "A)  The client did not take actions to purposely avail herself of State B simply by driving through State B.\n\nB)  It is unfair, inconvenient, and highly unreasonable to require a college student with limited financial resources to defend the action in State B for financial reasons.\n\nC)  The interstate judicial ghts may be assigned. At common law, requirements and output contractswere not assignable. Under Article 2 of the UCC, however, requirements and output contracts are assignable as longas the assignee does not disproportionately alter the contemplated quantity. Here, this contract is governed by Article2, as it is for the sale of goods. The miller tendered the first installment in compliance with the original contractbetween the flour wholesaler and the ", "takeaway": "Generally, all contractual rights may be assigned. At common law, requirements and output contractswere not assignable. Under Article 2 of the UCC, however, requirements and output contracts are assignable as longas the assignee does not disproportionately alter the contemplated quantity. Here, this contract is governed by Article2, as it is for th", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1542", "topic": "Contracts", "subtopic": "Contract Content and Meaning", "question": "A buyer purchased a new car from a dealer under a written contract that provided that the price of the car was$20,000 and that the buyer would receive a \"trade-in allowance of $7,000 for the buyer's old car.\" The old car hadrecently been damaged in an accident. The contract contained a merger clause stating: \"This writing constitutes theentire agreement of the parties, and there are no other understandings or agreements not set forth herein.\" When thebuyer took possession of the new car, she delivered the old car to the dealer. At that time, the dealer claimed that thetrade-in allowance included an assignment of the buyer's claim against her insurance company for damage to the oldcar. The buyer refused to provide the assignment.The dealer sued the buyer to recover the insurance payment. The dealer has offered evidence that the parties agreedduring their negotiations for the new car that the dealer was entitled to the insurance payment.Should the court admit this evidence?", "choices": "A)  No, because the dealer's acceptance of the old car bars any additional claim by the dealer.\n\nB)  The correct answer is DQuestionA buyer purchased a new car from a dealer under a written contract that provided that the price of the car was$20,000 and that the buyer would receive a \"trade-in allowance of $7,000 for the buyer's old car.\" The old car hadrecently been damaged in an accident. The contract contained a merger clause stating: \"This writing constitutes theentire agreement of the parties, and there are no other understandings or agreements not set forth herein.\" When thebuyer took possession of the new car, she delivered the old car to the dealer. At that time, the dealer claimed that thetrade-in allowance included an assignment of the buyer's claim against her insurance company for damage to the oldcar. The buyer refused to provide the assignment.The dealer sued the buyer to recover the insurance payment. The dealer has offered evidence that the parties agreedduring their negotiations for the new car that the dealer was entitled to the insurance payment.Should the court admit this evidence?\n\nC)  Yes, because a merger clause does not bar evidence of fraud.\n\nD)  Yes, because the merger clause does not bar evidence to explain what the parties meantby \"trade-in allowance.\"", "correct": "D", "rule": "D is correct. Under the Uniform Commercial Code's (UCC) parol evidence rule, a merger clause does not conclusivelyestablish that an agreement is completely integrated. Moreover, a finding that an agreement is completely integrateddoes not necessarily bar the admission of extrinsic evidence. Although extrinsic evidence is inadmissible tosupplement or contradict the express terms of a completely integrated agreement, such evidence is admissible toexplain the terms of an agreement. In this case, ev", "takeaway": "Under the Uniform Commercial Code's (UCC) parol evidence rule, a merger clause does not conclusivelyestablish that an agreement is completely integrated. Moreover, a finding that an agreement is completely integrateddoes not necessarily bar the admission of extrinsic evidence. Although extrinsic evidence is inadmissible tosupplement or contradict t", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Intentional Torts", "question": "A golfer and her instructor were playing golf in a foursome when the golfer became very annoyed with critical comments made by the instructor. To show the other golfers in the group how annoyed she was with her instructor, the golfer stood a few yards behind him while the instructor was teeing off and swung a club at him. The instructor, who was focusing on his shot, was not within range of the club but unfortunately the club slipped out of the golfer's hands and struck the instructor in the head, injuring him. If the instructor brings a battery action against the golfer, will he recover?", "choices": "A)  Yes, because the golfer acted intentionally and caused harmful contact to her instructor.\n\nB)  Yes, because the golfer intended to cause the instructor reasonable apprehension of imminent harmful contact.\n\nC)  No, because the golfer did not intend to cause harmful or offensive contact.\n\nD)  No, unless the golfer acted unreasonably in swinging the club at her instructor.", "correct": "C", "rule": "The golfer will not be liable because she did not intend to cause harmful or offensive contact. The prima facie case for battery has the following elements: (i) an act by the defendant that brings about harmful or offensive contact to the plaintiff's person; (ii) intent on the part of the defendant to bring about harmful or offensive contact to the plaintiff's person; and (iii) causation. Here, the golfer did not have the intent to cause harmful or offensive contact. Also, as explained below, the transferred intent doctrine does not apply here. Hence, she will not be guilty of battery. (A) is incorrect because even though the golfer had the intent to swing the club, she did not have the inte", "takeaway": "The golfer will not be liable because she did not intend to cause harmful or offensive contact.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Intentional Torts", "question": "A missionary was travelling door to door hoping to convert others to his church. At one house, a devout elderly woman answered the door and the two began discussing their religious differences. The conversation took a disagreeable turn, and the woman, greatly offended, slammed her door shut. The missionary had been leaning with his hand on the doorway during their conversation, and as a consequence, his fingers were pinched in the door, causing him injury. If the missionary asserts a claim based on battery against the woman and prevails, what is the most likely reason?", "choices": "A)  A missionary was travelling door to door hoping to convert others to his church. At one house, a devout elderly woman answered the door and the two began discussing their religious differences. The conversation took a disagreeable turn, and the woman, greatly offended, slammed her door shut. The missionary had been leaning with his hand on the doorway during their conversation, and as a consequence, his fingers were pinched in the door, causing him injury.  If the missionary asserts a claim based on battery against the woman and prevails, what is the most likely reason?  Responses  A\tThe woman had not first asked the missionary to leave the property.The woman had not first asked the missionary to leave the property. - no response given  B\tThe woman knew that the door was substantially certain to pinch the missionary's fingers.The woman knew that the door was substantially certain to pinch the missionary's fingers. - correct  C\tThe woman acted in anger by slamming the door shut.The woman acted in anger by slamming the door shut. - no response given  D\tThe missionary was not trespassing when he came to the woman's door.The missionary was not trespassing when he came to the woman's door. - no response given Answer Discussion - Correct  If the missionary prevails, it will be because the woman knew that the door would likely pinch his fingers. The requisite intent for intentional torts (such as battery) is satisfied if the actor knows with substantial certainty that the consequences of her conduct will result. Here, by slamming the door shut, the woman set in motion a force that brought about harmful contact to the missionary. (A) is wrong because a request to leave the property would not have justified commission of the battery. Generally, one may use reasonable force to prevent the commission of a tort against her property, if use of force is preceded by a request to desist. The missionary was not engaged in the commission of a tort against the woman's property. Thus, the woman's use of force was not justified, with or without a request to leave the property. (C) is wrong because the woman's anger is not determinative as to whether she had the requisite intent to commit a battery. (D) is wrong because the fact that the missionary was not trespassing when he came to the door is not determinative. Nothing in the facts indicates that the woman had the right to use force against the missionary at the time she slammed the door.\n\nB)  The woman knew that the door was substantially certain to pinch the missionary's fingers.\n\nC)  The woman acted in anger by slamming the door shut.\n\nD)  The missionary was not trespassing when he came to the woman's door.", "correct": "B", "rule": "If the missionary prevails, it will be because the woman knew that the door would likely pinch his fingers. The requisite intent for intentional torts (such as battery) is satisfied if the actor knows with substantial certainty that the consequences of her conduct will result. Here, by slamming the door shut, the woman set in motion a force that brought about harmful contact to the missionary. (A) is wrong because a request to leave the property would not have justified commission of the battery. Generally, one may use reasonable force to prevent the commission of a tort against her property, if use of force is preceded by a request to desist. The missionary was not engaged in the commission", "takeaway": "If the missionary prevails, it will be because the woman knew that the door would likely pinch his fingers.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Intentional Torts", "question": "An impatient driver who was fed up with jaywalking pedestrians drove straight at one of them, leaning on the horn and intending to make her jump. She did not hear him or change her pace, however, because her music player was turned to full volume. A bystander on the curb rushed out to pull her to safety. She tripped as she was being pulled to the curb, fracturing her kneecap. If the pedestrian sues the driver for assault, what will be the likely result?", "choices": "A)  The driver wins, because the pedestrian did not know at the time that she was in danger from the driver.\n\nB)  The driver wins, because he did not intend for the pedestrian to be injured by his conduct.\n\nC)  The pedestrian wins, because the driver intended to create in her an apprehension of immediate harmful contact.\n\nD)  The pedestrian wins, because the driver's conduct was a substantial factor in causing her injury.", "correct": "A", "rule": "The driver is not liable for assault because he did not cause the pedestrian to reasonably apprehend an immediate harmful contact. The prima facie case for assault requires (i) an act by defendant causing a reasonable apprehension in plaintiff of immediate harmful or offensive contact to plaintiff's person, (ii) intent by defendant to bring about in plaintiff apprehension of that contact, and (iii) causation. For there to be apprehension, plaintiff must be aware of defendant's act at the time that it is occurring. Here, because the pedestrian was oblivious to the driver's attempt to scare her, the driver is not liable for assault. (B) is incorrect because whether the driver had an intent to", "takeaway": "The driver is not liable for assault because he did not cause the pedestrian to reasonably apprehend an immediate harmful contact.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Defenses", "question": "Force may not be used by __________.", "choices": "A)  a property owner to defend property from tortious interference\n\nB)  a citizen in effecting a misdemeanor arrest\n\nC)  a landowner to regain real property after being tortiously dispossessed\n\nD)  an owner of chattel to recapture the chattel", "correct": "C", "rule": "A landowner may not use force to regain real property after being tortiously dispossessed. Most states today do not allow resort to \"self-help\"; one who has been wrongfully excluded from possession of real property may bring an ejectment action or other summary procedure to recover possession. Hence, the owner who uses force to retake possession is liable for whatever injury she inflicts. (In former years, under the common law, a landowner tortiously dispossessed of real property could use reasonable force to regain possession, if she acted promptly upon discovery of the dispossession.) An owner of chattel may use force to recapture the chattel. An owner may use reasonable force to recapture", "takeaway": "A landowner may not use force to regain real property after being tortiously dispossessed.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Defenses", "question": "Which of the following is accurate regarding the defense of property?", "choices": "A)  A landowner may use deadly force to defend her property.\n\nB)  A landowner cannot make a mistake as to whether an intrusion of her property has occurred.\n\nC)  A landowner usually must make a request to desist before defending her property.\n\nD)  A landowner's right to defend her property supersedes other privileges.", "correct": "A", "rule": "A landowner usually must make a request to desist before defending her property. A request is not required if the circumstances make it clear that the request would be futile or dangerous. A landowner's right to defend her property does NOT supersede other privileges. If another is privileged to enter upon a landowner's property, due to necessity, a right of reentry, right to recapture chattels, etc., that privilege supersedes the landowner's right to defend her property. A landowner CAN make a mistake as to whether an intrusion of her property has occurred. A reasonable mistake is allowed as to the landowner's right to use force in defense of property, if the mistake involves whether an int", "takeaway": "A landowner usually must make a request to desist before defending her property.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Defense", "question": "A college student owned a very popular video game system that was out of stock in most stores. He agreed to let his friend use the system for a few days, on condition that he return the system by the weekend because the student was hosting a small party. On the morning of the party, the friend still had not returned the game system, so the student went to the friend's apartment and demanded it back. The friend refused, so the student grabbed the system and wrestled it out of the friend's hands. If the friend sues the student for battery, will he recover on this claim?", "choices": "A)  No, because the student used reasonable force in attempting to seize the game system.\n\nB)  No, unless the student proves that the friend's delay in the return of the game system was unreasonable.\n\nC)  Yes, because the student had originally agreed to lend the game system to the friend.\n\nD)  Yes, because the student had to give the friend a reasonable period of time after demand in which to return the game system.", "correct": "C", "rule": "The friend will recover for battery because the student did not have the right to use force. The defense of recapture of chattels is limited by the circumstances of the original dispossession. When another's possession of the owner's chattel began lawfully, the owner may use only peaceful means to recover the chattel. Force may be used to recapture a chattel only when in \"hot pursuit\" of one who has obtained possession wrongfully (e.g., by theft). Here, the friend's initial possession of the game system was a bailment, because the student consented to his borrowing it. Thus, the student is not entitled to use force to recover it, and his wrestling it away from the friend constituted the requ", "takeaway": "The friend will recover for battery because the student did not have the right to use force.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Defenses", "question": "A teenager and his father were practicing baseball in a sandlot when the teenager hit the ball over his father's head and onto a landowner's adjacent property. The landowner had several \"beware of dog\" signs posted along his fence, but the father did not notice them in his haste to retrieve the ball. The father climbed over the fence into the landowner's yard and was attacked by the landowner's vicious guard dog, which was trained to maim intruders. The dog bit the father, causing him to suffer severe lacerations that required numerous stitches. If the father brings an action against the landowner to recover damages for his injuries, will he likely prevail?", "choices": "A)  Yes, because the landowner may not use a vicious dog to protect only his property.\n\nB)  Yes, because the landowner is strictly liable for injuries caused by the vicious dog.\n\nC)  No, because the father was trespassing on the landowner's property.\n\nD)  No, because the landowner had posted signs warning about the dog.", "correct": "A", "rule": "The father will prevail because the landowner may not intentionally use a vicious dog to protect only his property. One may use only reasonable force to defend property. A landowner may not use force that will cause death or serious bodily harm. Furthermore, one may not use indirect deadly force such as a trap, spring gun, or vicious dog when such force could not lawfully be directly used, e.g., against a mere trespasser. (B) is incorrect because strict liability in such cases generally is not imposed in favor of undiscovered trespassers against landowners. Trespassers cannot recover for injuries inflicted by the landowner's abnormally dangerous domestic animals in the absence of negligence.", "takeaway": "The father will prevail because the landowner may not intentionally use a vicious dog to protect only his property.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Defenses", "question": "A motorist was driving along a narrow, winding road when his car ran out of gas. Because the road had no shoulders, the motorist pushed his car onto the driveway of a landowner. Finding no one home at the house, the motorist started walking toward a gas station he had passed a mile back. While he was gone, the landowner returned and found the car in his driveway, with two of its wheels partially on his flower garden. Although the landowner had not posted any \"no trespassing\" signs, he believed he had the right to remove the car from his property. The car was unlocked, so he released the parking brake and pushed the car back onto the edge of the road, and then reset the brake. Before the motorist could return, a truck had sideswiped the car, damaging it. Can the motorist recover against the landowner for the damage to his car?", "choices": "A)  Yes, because the landowner had not posted any \"no trespassing\" signs on his property.\n\nB)  Yes, because the motorist was privileged to leave his car there.\n\nC)  No, because the motorist's car damaged the landowner's property.\n\nD)  No, because the landowner reasonably believed that he had a right to remove the car from his property.", "correct": "B", "rule": "The motorist can recover against the landowner because the privilege of private necessity applied. A person may interfere with the real or personal property of another when the interference is reasonably and apparently necessary to avoid threatened injury from a natural or other force and the threatened injury is substantially more serious than the invasion that is undertaken to avert it. Here, it was necessary for the motorist to push the car into the landowner's driveway to avoid the threat of other vehicles colliding with it on the narrow road, which would be a substantially more serious harm than any damage to the landowner's property. Hence, the landowner was not entitled to move the ca", "takeaway": "The motorist can recover against the landowner because the privilege of private necessity applied, but the motorist would be liable for the damages to the flowers. If this had been a privilege of public necessity, the motorist would not be liable to damages to the flowers because privilege of public necessity is an absolute privilege.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "2151", "topic": "Civil Procedure", "subtopic": "Law Applied by Federal Courts", "question": "A lumberjack properly brought a single-count complaint alleging medical malpractice against a doctor in the federaldistrict court of State A based on diversity jurisdiction. The jury found for the lumberjack and awarded him $2.5 millionin damages.Federal law permits a judge to set aside a jury's verdict and order a new trial if the jury's award is so high that it\"shocks the conscience.\" State A's tort reform statute authorizes a judge to order a new trial only upon a finding of\"excessive damages.\"May the federal district court order a new trial?", "choices": "A)  The correct answer is BQuestionA lumberjack properly brought a single-count complaint alleging medical malpractice against a doctor in the federaldistrict court of State A based on diversity jurisdiction. The jury found for the lumberjack and awarded him $2.5 millionin damages.Federal law permits a judge to set aside a jury's verdict and order a new trial if the jury's award is so high that it\"shocks the conscience.\" State A's tort reform statute authorizes a judge to order a new trial only upon a finding of\"excessive damages.\"May the federal district court order a new trial?\n\nB)  Yes, because it may find that the jury awarded excessive damages.\n\nC)  No, because doing so would violate the Seventh Amendment.\n\nD)  No, because doing so would amount to federal additur.", "correct": "B", "rule": "B is correct. The court may order a new trial on the basis that the jurys award is excessive, which applies the State Astandard because this is a diversity case in federal court and absent a controlling federal rule, the state law where thecourt sits applies.A is incorrect. The court may order a new trial, but it must use the excessiveness standard from State As tort reformlaw, not the federal standard of shocks the conscience.C is incorrect. The Seventh Amendment would not prohibit the cour", "takeaway": "The court may order a new trial on the basis that the jurys award is excessive, which applies the State Astandard because this is a diversity case in federal court and absent a controlling federal rule, the state law where thecourt sits applies.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "2480", "topic": "Civil Procedure", "subtopic": "Motions", "question": "After a lengthy federal trial, the defendant moved for judgment as a matter of law (JMOL). The court denied the motionand sent the case to the jury, which returned a verdict f  saw thieves across the street break the window of a jewelry store, take jewelry, andleave in a car. The wife telephoned the police and relayed to them the license number of the thieves' car as herhusband looked out the window with binoculars and read it to her. Neither of them has any present memory of thenumber. The prosecutor offers as evidence a properly authenticated police tape recording of the wife's telephone callwith her voice giving the license number, which is independently shown to belong to the defendant's car.The tape recording of the wife stating the license is\n\nD)  inadmissible, because the wife never had firsthand knowledge of the license number.", "correct": "A", "rule": "A is correct. The recording satisfies the present sense impression exception to the hearsay rule because the wife wasrelaying the information in real-time, as reported by the husband while he was observing the event live.B is incorrect. The recording does constitute hearsay because it is an out-of-court statement offered for the truth of thematter asserted, but it satisfies the hearsay exception for present sense impressions and is thus admissible.C is incorrect. Although the recording is hearsa", "takeaway": "The recording satisfies the present sense impression exception to the hearsay rule because the wife wasrelaying the information in real-time, as reported by the husband while he was observing the event live.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "729", "topic": "Evidence", "subtopic": "Hearsay and Circumstances of Its Admissibility", "question": "A man and his friend were charged with burglary of a warehouse. They were tried separately. At the man's trial, thefriend testified that he saw the man commit the burglary. While the friend was still subject to recall as a witness, theman calls the friend's cellmate to testify that the friend said, \"I broke into the warehouse alone because [the man] wastoo drunk to help.\"The evidence of the friend's
