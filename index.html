ailable to testify. Therefore, this hearsay exception is inapplicable.C is incorrect. If the friend's statement to the cellmate, as testified to in court by the cellmate, were being offered forthe truth of the matter asserted, it would be inadmissible hearsay. However, the testimony is being introduced solely toimpeach the friend by his prior inconsistent statement, not as substantive evidence.D is incorrect. There is no rule requiring clear corroboration of a prior inconsistent statement that is being used toimpeach a witness. Although corroborating evidence may be required when a statement against interest exposes thedeclarant to criminal liability, that requirement does not apply when using a prior inconsistent statement merely toimpeach the witness. See Fed. R. Evid. 804. As explained above, the cellmate's testimony containing the friend's priorstatement is exclusively being used for impeachment, not as substantive evidence, rendering it admissible.\n\nB)  admissible, as a prior inconsistent statement.\n\nC)  The correct answer is BQuestionA man and his friend were charged with burglary of a warehouse. They were tried separately. At the man's trial, thefriend testified that he saw the man commit the burglary. While the friend was still subject to recall as a witness, theman calls the friend's cellmate to testify that the friend said, \"I broke into the warehouse alone because [the man] wastoo drunk to help.\"The evidence of the friend's statement is\n\nD)  inadmissible, because the statement is not clearly corroborated.", "correct": "B", "rule": "B is correct. The friend's statement to his cellmate is a prior inconsistent statement to the friend's earlier testimony thathe saw the man commit the burglary. Therefore, the cellmate's testimony regarding the friend's out-of-court statementis admissible to impeach the friend's earlier in-court testimony. As a foundational matter, the friend must be given anopportunity to explain or deny the allegedly inconsistent statement before it is offered, but the court has discretion todelay the opportun", "takeaway": "The friend's statement to his cellmate is a prior inconsistent statement to the friend's earlier testimony thathe saw the man commit the burglary. Therefore, the cellmate's testimony regarding the friend's out-of-court statementis admissible to impeach the friend's earlier in-court testimony. As a foundational matter, the friend must be given anopp", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1482", "topic": "Contracts", "subtopic": "Contract Content and Meaning", "question": "A farmer contracted to sell 100,000 bushels of wheat to a buyer. When the wheat arrived at the destination, the buyerdiscovered that the farmer had delivered only 96,000 bushels. The buyer sued the farmer for breach of contract. Atthe trial of the case, the court found that the written contract was intended as a complete and exclusive statement ofthe terms of the agreement. The farmer offered to prove that in the wheat business, a promise to deliver a specifiedquantity is considered to be satisfied if the delivered quantity is within 5% of the specified quantity. The buyer objectedto the offered evidence.Is the court likely to admit the evidence offered by the farmer?", "choices": "A)  No, because the offered evidence is inconsistent with the express language of the agreement.\n\nB)  No, because the written contract was totally integrated.\n\nC)  Yes, because the offered evidence demonstrates that the farmer substantially performed thecontract.\n\nD)  Yes, because the offered evidence explains or supplements the agreement by usage oftrade.", "correct": "D", "rule": "D is correct. This transaction involves a sale of goods and is subject to Uniform Commercial Code (UCC) Article 2.Under Article 2, evidence of trade usage that can be construed as reasonably consistent with an agreement's expresslanguage is admissible to interpret or supplement an agreement. The majority rule provides that trade usage will beviewed as consistent with an agreement's express language unless the usage completely negates specific expresslanguage. The trade usage allowing for a varia", "takeaway": "This transaction involves a sale of goods and is subject to Uniform Commercial Code (UCC) Article 2.Under Article 2, evidence of trade usage that can be construed as reasonably consistent with an agreement's expresslanguage is admissible to interpret or supplement an agreement. The majority rule provides that trade usage will beviewed as consistent", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Duty", "question": "Which of the following persons is considered a licensee of the landowner?", "choices": "A)  A member of the public visiting a free museum.\n\nB)  A health inspector determining whether to renew the landowner's food service license.\n\nC)  A friend of the landowner invited in after giving the landowner a ride home.\n\nD)  A trespasser who the landowner knows regularly crosses over a section of the landowner's land.", "correct": "A", "rule": "The friend of the landowner is a social guest and therefore a licensee. Under traditional landowner liability rules, a licensee is one who enters on the land with the landowner's permission, express or implied, for her own purpose or business rather than for the landowner's benefit. Even though a host may also derive some benefit from the presence of a social guest, including receiving the performance of minor services by the guest, this does not make the guest an invitee. A trespasser who the landowner knows regularly crosses over a section of the landowner's land is an anticipated trespasser and not a licensee. The duty owed to discovered and anticipated trespassers is not as high as the d", "takeaway": "The friend of the landowner is a social guest and therefore a licensee.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Duty", "question": "A homeowner born on the fourth of July celebrated his birthday in his backyard with an assortment of fireworks and skyrockets, despite a severe drought and watering ban that left the grass extremely dry. One of the fireworks landed in a pile of dry grass clippings behind his garage, but the homeowner neglected to check whether it was extinguished. The grass clippings ignited, and the fire eventually spread to the rear wall of the garage. By the time the homeowner discovered the fire and called the fire department, the flames were reaching as high as the vacant apartment on the second floor of the garage. The first firefighter to arrive rushed with a hose to the back of the garage. As he went up the outside stairs leading to the back door of the apartment, one of the steps broke, causing him to fall to the ground and break his leg. Unbeknownst to the homeowner, the wood on the underside of the step had rotted away. In a suit by the firefighter against the homeowner, will the firefighter likely prevail?", "choices": "A)  Yes, because the homeowner was negligent in allowing the fire to start.\n\nB)  Yes, because it was foreseeable that the homeowner's shooting off the fireworks would necessitate the assistance of the fire department.\n\nC)  No, unless the jury determines that the homeowner could have discovered the condition of the step with a reasonable inspection.\n\nD)  No, because a firefighter cannot recover for negligent conduct of another that causes him to be injured from risks that are inherent to his duties.", "correct": "D", "rule": "The homeowner is not liable because the \"firefighter's rule,\" based on assumption of risk or public policy grounds, generally will preclude a firefighter from recovering for injuries occurring on duty from risks inherent to his job, even if they are caused by another's negligence. One engaged in the activity of firefighting is deemed to know of the risks inherent in that activity, including the fact that a landowner may have failed to inspect or repair dangerous conditions on the land. (D) is therefore correct. (A) is incorrect because a common cause of fires is negligence by the property owner; that does not affect application of the rule. Thus, even if the homeowner acted negligently in al", "takeaway": "The homeowner is not liable because the \"firefighter's rule,\" based on assumption of risk or public policy grounds, generally will preclude a firefighter from recovering for injuries occurring on duty from risks inherent to his job, even if they are caused by another's negligence.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Duty", "question": "Which of the following is correct regarding a landowner's duty to an invitee under traditional landowner liability rules?", "choices": "A)  The landowner must repair dangerous conditions to satisfy his duty to invitees.\n\nB)  The landowner does not owe an invitee a duty to make inspections.\n\nC)  An invitee may lose that status if she exceeds the scope of her invitation.\n\nD)  A firefighter engaged in fighting a fire on the landowner's premises is an invitee.", "correct": "C", "rule": "An invitee may lose that status if she exceeds the scope of her invitation . A person loses her status as an invitee if she exceeds the scope of the invitation, such as if she goes into a portion of the premises where her invitation cannot reasonably be said to extend. A firefighter engaged in fighting a fire on the landowner's premises is NOT an invitee. Under the \"firefighter's rule,\" police officers and firefighters are generally treated like licensees rather than invitees, based on public policy or assumption of risk grounds. They cannot recover for a landowner's failure to inspect or repair dangerous conditions that are an inherent risk of their law enforcement or firefighting activity.", "takeaway": "An invitee may lose that status if she exceeds the scope of her invitation .", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Breach", "question": "A bottler markets water in lightweight plastic bottles that are sold by grocery stores, sporting goods stores, and other retail outlets. A hiker purchased several bottles of the water from a retailer and took them with him on a hike. While the hiker left his backpack unattended, a thief took one of the unopened containers without permission and drank some of the water. He immediately became violently ill. Tests were run on the water and showed that it contained impurities. If the thief maintains a negligence action against the bottler, which of the following arguments would be the most helpful to the bottler in avoiding liability?", "choices": "A)  The retailer had ample opportunity to test and inspect samples of the bottled water for purity and failed to do so.\n\nB)  The bottler bottled its water in compliance with numerous statutes that regulate the process of bottling water for human consumption.\n\nC)  The thief has failed to introduce any evidence at trial as to how the impurities got into the water he drank, and therefore has not met his burden of proof.\n\nD)  No reasonable person would have foreseen that the water would have been stolen and consumed by a thief.", "correct": "B", "rule": "Evidence that the bottler complied with applicable statutes will be admissible to show that the bottler acted with ordinary, reasonable care, and is the only one of the listed arguments that would be helpful to the bottler. The bottler is being sued on a negligence theory; thus, the thief must prove that the bottler failed to exercise ordinary, reasonable care in bottling and distributing the water. Violation of a statute will establish a conclusive presumption of duty and breach of duty. However, compliance with an applicable statute does not necessarily establish due care, because due care may require more than is called for by the statute. Nevertheless, compliance with a statute is admiss", "takeaway": "Evidence that the bottler complied with applicable statutes will be admissible to show that the bottler acted with ordinary, reasonable care, and is the only one of the listed arguments that would be helpful to the bottler.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Breach", "question": "A fire broke out in a home that had been recently remodeled, destroying the house and injuring the homeowner. An investigation by the fire marshal established that the fire started from a short in some wiring behind a wall. A small section of wiring that ran to an outlet through a narrow gap between a furnace chimney and a hot water pipe had part of its outer sheath cut off. The homeowner filed suit against the electrical company that did the rough wiring. The parties stipulated for trial that the company had installed the wiring in compliance with the blueprints, and that the wiring had been inspected and approved by the building inspector before the chimney and the water pipe had been installed and the walls put up, all by different contractors. At trial, the homeowner introduced the report of the fire marshal establishing how the fire started, and evidence of his medical expenses and other damages. At the end of the homeowner's case, the electrical company's attorney rested her case and moved for a directed verdict. The homeowner's attorney also moved for a directed verdict. How should the court rule on the directed verdict motions?", "choices": "A)  Deny the electrical company's motion and grant the homeowner's motion for a directed verdict, because a short in the wiring caused the homeowner's injuries.\n\nB)  Deny the electrical company's motion and grant the homeowner's motion for a directed verdict, because the company failed to rebut the presumption of negligence that the homeowner has established.\n\nC)  Deny the homeowner's motion and grant the electrical company's motion for a directed verdict, because the wire could have been damaged by another contractor.\n\nD)  Deny both directed verdict motions, because the homeowner has presented enough evidence to submit the case to the jury.", "correct": "C", "rule": "The court should grant the electrical company's motion for a directed verdict because the homeowner has not established a prima facie case of negligence on the company's part. The homeowner has established that the electrical company owed a duty to him and that he has suffered harm from the fire caused by the short in the wiring. However, he has not established that the company breached any duty to him. While breach of duty is ordinarily a question for the trier of fact, a plaintiff's failure to offer any evidence on that element of the prima facie case will permit a directed verdict for the defendant. Under certain circumstances, the fact that a particular injury occurred may itself establi", "takeaway": "The court should grant the electrical company's motion for a directed verdict because the homeowner has not established a prima facie case of negligence on the company's part.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Proximate Cause", "question": "Which of the following situations involves a common intervening force that courts almost always find foreseeable?", "choices": "A)  A roofer negligently leaves a hammer on the plaintiff's roof, and a strong wind blows the hammer off the roof, where it strikes the plaintiff\n\nB)  A parking lot attendant negligently leaves the keys to the plaintiff's car inside it with the doors unlocked, and a thief steals the car\n\nC)  A defendant negligently causes a plaintiff to break her leg, and while walking on her crutches, the plaintiff loses her balance and injures herself\n\nD)  A defendant negligently blocks a sidewalk, forcing the plaintiff to walk in the roadway, where he is struck by a negligently driven car", "correct": "A", "rule": "If the plaintiff loses her balance while on crutches and injures herself, this involves an intervening force that is a normal response or reaction to the situation created by the defendant's act. This is a subsequent accident situation, where the plaintiff suffers a subsequent injury following her original injury, and the original injury was a substantial factor in causing the second accident. This is a type of intervening force that courts almost always find foreseeable. The other situations involve intervening forces that operate on a situation created by a defendant's negligence but are independent actions, rather than natural responses or reactions to the situation. An independent neglig", "takeaway": "If the plaintiff loses her balance while on crutches and injures herself, this involves an intervening force that is a normal response or reaction to the situation created by the defendant's act.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Proximate Cause", "question": "Two neighbors who worked in a large city nearby alternated days driving. Because the commute took them through a crime-ridden area, one commuter was vigilant about keeping her car well-maintained, but the other failed to maintain her car or bring it in for servicing, despite the first commuter's complaints and dashboard warning lights indicating that it needed servicing. One evening after dark when the latter was driving them both home from work, her car died just as they were passing through a dangerous neighborhood. The passenger, who was calling for assistance on her cell phone, protested when the driver opened her door to look at the engine. Two assailants appeared and beat and robbed the driver and passenger. Does the passenger have a valid claim against the driver for her injuries?", "choices": "A)  Yes, because the driver owed her the same increased level of care that a common carrier owed its passenger.\n\nB)  Yes, because the jury could reasonably conclude that the driver's negligence increased the risk that the passenger would be the victim of criminal activity.\n\nC)  No, because independent criminal acts of third persons are considered intervening forces that supersede any negligence by the driver.\n\nD)  No, because the driver had no duty to prevent criminal attacks on the passenger.", "correct": "B", "rule": "The passenger has a valid claim against the driver because the jury could reasonably conclude that she was negligent. The driver owes a duty of ordinary care to his passenger regardless of whether that passenger is paying or not paying. The driver also owed a duty to act as a reasonable person would under emergency circumstances after the car was stopped. Her opening of the car door, as well as her failure to maintain her car, could be found to be negligent under the circumstances. The acts of the criminals were foreseeable, because every day the passenger and the driver commuted through this dangerous neighborhood. (A) is incorrect because this is the standard of care owed to a paying passe", "takeaway": "The passenger has a valid claim against the driver because the jury could reasonably conclude that she was negligent.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Torts", "subtopic": "Proximate Cause", "question": "A law enforcement officer was transporting a prisoner on a plane to testify in a criminal case. Unknown to those on the plane, an assassin hired to kill the prisoner had bribed an airport baggage handler to sneak a timed-release crate of poisonous snakes into the cargo hold of the plane. Once the crate was triggered to open, the snakes were able to slither into the passenger compartment through gaps in the conduits between the cargo hold and the passenger compartment. In the ensuing panic caused by the snakes, the officer was struck in the head by a fire extinguisher that another passenger threw at a snake, and suffered a severe concussion. The officer filed suit against numerous parties, including the person who designed the conduit system on that type of plane. At trial, evidence established that the design for the conduit system that he used had been rejected in the industry because of the danger of pressure loss between the cargo hold and the passenger compartment. An industry-approved design that the designer could have used would have kept the snakes from getting into the passenger compartment of the plane. As between the officer and the designer, which party is likely to prevail?", "choices": "A)  The officer, because the designer is strictly liable for designing the conduit system of the plane.\n\nB)  The officer, because of the high degree of care owed to passengers of a common carrier.\n\nC)  The designer, because the assassin's actions were an unforeseeable intervening force.\n\nD)  The designer, because the officer was injured by another passenger rather than a snake.", "correct": "C", "rule": "The designer will prevail because the assassin's actions were an unforeseeable intervening force. To establish a prima facie case for negligence, the following elements must be proved: (i) the existence of a duty on the part of the defendant to conform to a specific standard of conduct for the protection of the plaintiff against an unreasonable risk of injury; (ii) breach of that duty by the defendant; (iii) the breach of the duty by the defendant was the actual and proximate cause of the plaintiff's injury; and (iv) damage to the plaintiff's person or property. The general rule of proximate cause is that the defendant is liable for all harmful results that are the normal incidents of, and w", "takeaway": "The designer will prevail because the assassin's actions were an unforeseeable intervening force.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Motions", "question": "A citizen of State A filed a breach of contract action against a citizen of State B in a State A state trial court. The State B defendant timely and properly removed the action to the United States District Court for the District of State A. The defendant then filed a motion to dismiss the action based on insufficient service of process. Following a hearing, the court found that service was proper and denied the motion. The defendant then filed her answer, responding to the merits of the complaint and asserting that the case should be dismissed on the grounds that another action was pending between the same parties for the same cause in a State B state court. The State A Rules of Civil Procedure provide that a party waives the right to seek dismissal on that ground if the party files a pre-answer motion to dismiss and does not assert that ground in the motion. Should the federal court hold that the defendant has waived the right to seek dismissal based on the pendency of the same cause in another court?", "choices": "A)  Yes, because this action was commenced in a State A state court, so the federal court must apply State A law.\n\nB)  Yes, because this action is in a federal court in State A on the basis of the court's diversity of citizenship jurisdiction, so the federal court must apply State A law.\n\nC)  No, because this issue is unlikely to affect the outcome of the action or to create forum-shopping, so the federal court should apply federal law, under which the defendant has not waived this defense.\n\nD)  No, because this issue is governed by the Federal Rules of Civil Procedure, under which the defendant has not waived this defense.", "correct": "D", "rule": "The defendant has not waived this defense. Unlike the state rule here, Federal Rule of Civil Procedure 12 does not require the defendant to raise the defense that another action is pending between the parties in the first responsive pleading. While the federal court exercising diversity of citizenship subject matter jurisdiction must apply state substantive law (here, State A law), applicable Federal Rules of Civil Procedure supersede state law in federal court as long as the rule comports with the requirements of the Rules Enabling Act (i.e., the rule governs practice and procedure and does not modify or abridge substantive rights). (A) and (B) are incorrect because they are too broad. The", "takeaway": "The defendant has not waived this defense.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "SMJ", "question": "A researcher and an analyst had employment contracts with a corporation. The corporation fired them because it believed they had conspired to give its trade secrets to a competitor. Knowing that the conspiracy allegations were not true, the researcher and the analyst sued the corporation in federal district court for breach of their employment contracts. The researcher seeks $100,000 in damages and the analyst seeks $50,000. They are both citizens of State A. The corporation is incorporated in State B, and its principal place of business is in State B. Does the federal district court have subject matter jurisdiction over both of the claims?", "choices": "A)  Yes, the court has diversity of citizenship jurisdiction over both claims because the amounts of their related claims may be aggregated to satisfy the amount in controversy requirement.\n\nB)  Yes, the court has diversity of citizenship jurisdiction over the researcher's $100,000 claim and supplemental jurisdiction over the analyst's $50,000 claim.\n\nC)  No, the court does not have subject matter jurisdiction over the analyst's $50,000 claim because the claims of both plaintiffs may not be aggregated to satisfy the amount in controversy requirement.\n\nD)  No, the court does not have subject matter jurisdiction over either claim because the breach of contract claim is based on state law.", "correct": "B", "rule": "The court has jurisdiction over both claims but under different bases. Generally, every claim in federal court must have a basis for federal subject matter jurisdiction. There are three main flavors of federal subject matter jurisdiction-diversity of citizenship jurisdiction, federal question jurisdiction, and supplemental jurisdiction. Diversity of citizenship jurisdiction is available when (i) there is complete diversity of citizenship, meaning that each plaintiff is a citizen of a different state from every defendant; and (ii) the amount in controversy exceeds $75,000. A natural person's citizenship is the state that is the person's permanent home. A corporation is a citizen of every stat", "takeaway": "The court has jurisdiction over both claims but under different bases.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "SMJ", "question": "A pedestrian was injured in a car accident involving two cars. The pedestrian filed a negligence action against both drivers in federal district court, seeking to hold them jointly and severally liable for $500,000. The pedestrian is a citizen of State A, and both drivers are citizens of State B. The first driver then asserted a cross-claim against the second driver, claiming that the second driver's negligence was the sole cause of the accident and seeking to recover from the second driver $15,000 for the damage done to the first driver's car. Does the federal court have subject matter jurisdiction over the cross-claim?", "choices": "A)  No, because the cross-claim is between two citizens of the same state.\n\nB)  No, because the amount of the cross-claim is too small.\n\nC)  No, because there is no supplemental jurisdiction over the cross-claim unless it is related to a federal question claim asserted in the same action, and there is no federal question claim.\n\nD)  Yes, the court has supplemental jurisdiction over the cross-claim.", "correct": "D", "rule": "The court has supplemental jurisdiction over the cross-claim. Generally, every claim in federal court must have a basis for federal subject matter jurisdiction. There are three main flavors of federal subject matter jurisdiction-diversity of citizenship jurisdiction, federal question jurisdiction, and supplemental jurisdiction. Diversity of citizenship jurisdiction is available when (i) there is complete diversity of citizenship, meaning that each plaintiff is a citizen of a different state from every defendant; and (ii) the amount in controversy exceeds $75,000. Here, the case is properly in federal court because diversity jurisdiction exists for the underlying claim (i.e., the claim by the", "takeaway": "The court has supplemental jurisdiction over the cross-claim.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Service", "question": "A plaintiff from State A filed a breach of contract action in a federal court in State B. The defendant in the action is a State B corporation. The corporation's president and registered agent, the only officer having express authority to receive service of process on behalf of the corporation, was out of the country for several months. State B's rules of civil procedure authorize service on a corporation by serving any \"officer, managing or general agent, or any agent authorized to receive service.\" State B's rules also authorize service of process by certified mail. The plaintiff thus sent the summons and complaint to the defendant corporation's only vice president, who resides in State B. The vice president signed the certified mail return receipt. If the corporation files a motion to dismiss the action for improper service of process, how should the court rule?", "choices": "A)  Deny the motion, because service of process was proper.\n\nB)  Deny the motion, because the defendant waived service of process by allowing its only agent authorized to receive service to leave the country.\n\nC)  Grant the motion, because, despite what state rules allow, service on a corporation sued in federal court must be on the officer or agent of the corporation who is authorized by the corporation to receive service on behalf of the corporation.\n\nD)  Grant the motion, because, despite what state rules allow, service on a corporation sued in federal court may not be made by certified mail.", "correct": "A", "rule": "The court should deny the motion to dismiss because service of process was proper. The federal rules do not expressly authorize service on a corporation by service on individuals by certified mail. However, the rules do authorize service pursuant to the rules used by the state in which the federal court sits and in which service takes place. Thus, the plaintiff here may use certified mail as a means of serving process. (B) is incorrect because the fact that the expressly authorized agent left the country is not really relevant to service of process. Other methods are authorized. Furthermore, the fact that the authorized agent was out of the country might be good cause to have the period for", "takeaway": "The court should deny the motion to dismiss because service of process was proper.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Motions", "question": "After filing her complaint in federal district court, a plaintiff mailed to a defendant by ordinary first-class mail the following: duly executed copies of the complaint and summons, a request that the defendant waive service of process, two copies of a waiver-of-service form, and an addressed, prepaid return envelope. The defendant signed the waiver-of-service form and returned a copy to the plaintiff. Fifty days after the plaintiff mailed the forms to the defendant and 25 days after the defendant returned the signed form to the plaintiff, the plaintiff filed a motion for entry of default and a default judgment. The following day, the defendant filed and served his answer. Was the defendant's answer timely?", "choices": "A)  No, because the defendant may no longer file an answer once the time for filing a response to a complaint has expired and the plaintiff has filed a motion for default judgment.\n\nB)  No, because the Federal Rules of Civil Procedure require a defendant to file a response to a complaint within 21 days after being served with process.\n\nC)  Yes, because the defendant filed his answer less than 28 days after he returned the waiver of service form.\n\nD)  Yes, because a defendant who waives service of process is allowed additional time in which to respond to the complaint, and the time had not yet expired.", "correct": "D", "rule": "The defendant's answer was timely. Although a defendant typically must serve an answer or other appropriate response within 21 days after being formally served with process, a defendant who waives service of process is allowed 60 days from the date on which the plaintiff mailed the summons and complaint in which to serve a response. (A) is incorrect for a few reasons. First, as explained above, the time for filing had not expired. But even if it had, if the defendant files an answer after a motion for default judgment is filed but before the default is entered, the court must determine whether the defendant has good cause for filing a late answer as the court has discretion to extend the tim", "takeaway": "The defendant's answer was timely.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "N/A", "topic": "Civil Procedure", "subtopic": "Injunctions", "question": "A bar prep company discovered that its copyrighted content was being used in an online simulated exam that its competitor was administering in a few days. The company filed a petition for an ex parte order to direct the competitor to immediately remove that content from its website. The company submitted an affidavit specifying why immediate and irreparable injury will re let questions = JSON.parse(JSON.stringify(QUESTIONS_DATA));
let ruleComfort = {};
const STATUSES = ['Not Started','Reviewed','More Practice Needed','Mastered'];
const BADGE_CLASS = {'Not Started':'badge-not-started','Reviewed':'badge-reviewed','More Practice Needed':'badge-practice','Mastered':'badge-mastered'};
const STATUS_CLASS = {'Not Started':'not-started','Reviewed':'reviewed','More Practice Needed':'practice','Mastered':'mastered'};

// ── STORAGE (localStorage only) ──────────────────────────────────
function save(changedIdxs) {
  localStorage.setItem('mbe_q_v3', JSON.stringify(questions));
  localStorage.setItem('mbe_comfort_v3', JSON.stringify(ruleComfort));
}

function load() {
  try {
    const sq = localStorage.getItem('mbe_q_v3');
    if (sq) {
      const parsed = JSON.parse(sq);
      if (parsed && parsed.length > 0) {
        // localStorage is the source of truth — use it directly
        // Merge: start with hardcoded defaults for any question not in localStorage
        const lsMap = {};
        parsed.forEach(q => lsMap[q.num+'|'+q.topic+'|'+q.subtopic] = q);
        // Keep hardcoded questions not in localStorage (preserves rules/takeaways)
        const defaults = questions.filter(q => !lsMap[q.num+'|'+q.topic+'|'+q.subtopic]);
        // localStorage wins for everything it has
        questions = parsed.concat(defaults);
      }
    }
    const sc = localStorage.getItem('mbe_comfort_v3');
    if (sc) ruleComfort = JSON.parse(sc);
  } catch(e) { console.warn('Load error:', e); }
}

// ── HELPERS ────────────────────────────────────────────────────────
function ruleKey(q) { return (q.topic+'|'+q.subtopic+'|'+(q.rule||'').slice(0,40)).replace(/\s/g,'_'); }
function getStats() {
  return { total: questions.length, mastered: questions.filter(q=>q.mastered==='Yes').length, reviewed: questions.filter(q=>q.status==='Reviewed').length, practice: questions.filter(q=>q.status==='More Practice Needed').length, notStarted: questions.filter(q=>q.status==='Not Started').length };
}
function getTopicSubtopicMap() {
  const m={};
  questions.forEach(q=>{ if(!m[q.topic])m[q.topic]=new Set(); m[q.topic].add(q.subtopic); });
  return m;
}
function getTopicStats() {
  const tsm=getTopicSubtopicMap(), result=[];
  Object.keys(tsm).sort().forEach(topic=>{
    const tq=questions.filter(q=>q.topic===topic);
    result.push({topic, total:tq.length, mastered:tq.filter(q=>q.mastered==='Yes').length, practice:tq.filter(q=>q.status==='More Practice Needed').length, subtopics:[]});
    Array.from(tsm[topic]).sort().forEach(sub=>{
      const sq=questions.filter(q=>q.topic===topic&&q.subtopic===sub);
      result[result.length-1].subtopics.push({subtopic:sub, total:sq.length, mastered:sq.filter(q=>q.mastered==='Yes').length, practice:sq.filter(q=>q.status==='More Practice Needed').length});
    });
  });
  return result;
}
function pctPill(m,t) {
  if(!t) return '<span class="pct-pill pct-none">—</span>';
  const p=Math.round(m/t*100), c=p>=70?'pct-high':p>=40?'pct-mid':'pct-low';
  return '<span class="pct-pill '+c+'">'+p+'%</span>';
}
function parseChoices(s) {
  const lines=(s||'').split('\n').filter(l=>l.trim()), cs=[];
  let cur=null;
  lines.forEach(line=>{ const m=line.match(/^([A-D])\)\s+(.*)/); if(m){if(cur)cs.push(cur);cur={letter:m[1],text:m[2]};} else if(cur)cur.text+=' '+line.trim(); });
  if(cur)cs.push(cur);
  return cs;
}
function toast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

let logFilter={search:'',topic:'',status:'',mastered:''}, openCards=new Set();
function filteredQ() {
  return questions.filter(q=>{

    if(logFilter.status&&q.status!==logFilter.status)return false;
    if(logFilter.mastered&&q.mastered!==logFilter.mastered)return false;
    if(logFilter.search){const s=logFilter.search.toLowerCase();return q.topic.toLowerCase().includes(s)||q.subtopic.toLowerCase().includes(s)||q.question.toLowerCase().includes(s)||q.rule.toLowerCase().includes(s)||q.num.toLowerCase().includes(s);}
    return true;
  });
}

async function processFile(file) {
  const steps = document.getElementById('parse-steps');
  steps.classList.add('show');
  setStep(1,'running'); setStep(2,''); setStep(3,''); setStep(4,'');
  try {
    const ext = file.name.split('.').pop().toLowerCase();
    const arrayBuffer = await file.arrayBuffer();
    let pdfBytes = new Uint8Array(arrayBuffer);
    if(ext === 'zip') { const extracted = extractPDFFromZip(pdfBytes); if(!extracted) { toast('No PDF found inside ZIP'); steps.classList.remove('show'); return; } pdfBytes = extracted; }
    setStep(1,'done'); setStep(2,'running');
    const text = await extractPDFText(pdfBytes);
    if(!text || text.length < 200) { toast('Could not read this PDF. Make sure it is an AdaptiBar Past Questions Report.'); steps.classList.remove('show'); return; }
    setStep(2,'done'); setStep(3,'running');
    const wrongOnly = document.getElementById('wrong-only').checked;
    const parsed = parseAdaptibar(text, wrongOnly);
    if(!parsed.length) { toast('No ' + (wrongOnly ? 'wrong ' : '') + 'questions found in this report.'); steps.classList.remove('show'); return; }
    const existingKeys = new Set(questions.map(q => q.num+'|'+q.topic+'|'+q.subtopic));
    pendingImport = parsed.map(q => ({...q, _isNew: !existingKeys.has(q.num+'|'+q.topic+'|'+q.subtopic)}));
    setStep(3,'done'); setStep(4,'done');
    setTimeout(showImportPreview, 200);
  } catch(err) { console.error('processFile error:', err); toast('Error: ' + err.message); steps.classList.remove('show'); }
}

async function extractPDFText(pdfBytes) {
  const streamDelim = [115,116,114,101,97,109];
  const endDelim = [101,110,100,115,116,114,101,97,109];
  const streams = [];
  let pos = 0;
  while(pos < pdfBytes.length - 10) {
    let found = false;
    for(let i = pos; i < pdfBytes.length - streamDelim.length; i++) {
      let match = true;
      for(let j = 0; j < streamDelim.length; j++) { if(pdfBytes[i+j] !== streamDelim[j]) { match = false; break; } }
      if(match) {
        let dataStart = i + streamDelim.length;
        if(pdfBytes[dataStart] === 13 && pdfBytes[dataStart+1] === 10) dataStart += 2;
        else if(pdfBytes[dataStart] === 10) dataStart += 1;
        else { pos = i + 1; found = true; break; }
        let dataEnd = -1;
        for(let k = dataStart; k < pdfBytes.length - endDelim.length; k++) {
          let ematch = true;
          for(let m = 0; m < endDelim.length; m++) { if(pdfBytes[k+m] !== endDelim[m]) { ematch = false; break; } }
          if(ematch) { dataEnd = k; break; }
        }
        if(dataEnd === -1) { pos = i + 1; found = true; break; }
        let end = dataEnd;
        if(pdfBytes[end-1] === 10) end--;
        if(end > 0 && pdfBytes[end-1] === 13) end--;
        streams.push(pdfBytes.slice(dataStart, end));
        pos = dataEnd + endDelim.length;
        found = true; break;
      }
    }
    if(!found) break;
  }
  let fullText = '';
  for(const streamData of streams) {
    if(streamData.length < 4) continue;
    if(streamData[0] !== 0x78) continue;
    try {
      const ds = new DecompressionStream('deflate');
      const writer = ds.writable.getWriter();
      const reader = ds.readable.getReader();
      writer.write(streamData); writer.close();
      const chunks = [];
      while(true) { const {done, value} = await reader.read(); if(done) break; chunks.push(value); }
      const totalLen = chunks.reduce((s,c) => s+c.length, 0);
      const combined = new Uint8Array(totalLen);
      let offset = 0;
      for(const chunk of chunks) { combined.set(chunk, offset); offset += chunk.length; }
      let decoded = '';
      for(let i = 0; i < combined.length; i++) decoded += String.fromCharCode(combined[i]);
      if(!decoded.includes('BT') || !decoded.includes('Tj')) continue;
      const btRe = /BT([\s\S]+?)ET/g;
      let btMatch;
      while((btMatch = btRe.exec(decoded)) !== null) {
        const block = btMatch[1];
        let i = 0;
        while(i < block.length) {
          if(block[i] === '(') {
            let j = i + 1, depth = 1;
            while(j < block.length && depth > 0) {
              if(block[j] === '\\' && j+1 < block.length) j += 2;
              else if(block[j] === '(') { depth++; j++; }
              else if(block[j] === ')') { depth--; j++; }
              else j++;
            }
            const content = block.substring(i+1, j-1);
            const rest = block.substring(j).trimStart();
            if(rest.startsWith('Tj')) {
              let s = content.replace(/\xa0/g, ' ').replace(/\\n/g, '\n').replace(/\\r/g, '\r').replace(/\\\(/g, '(').replace(/\\\)/g, ')').replace(/\\\\/g, '\\');
              if(s.trim()) fullText += s;
            }
            i = j;
          } else { i++; }
        }
        fullText += '\n';
      }
    } catch(e) {}
  }
  return fullText;
}

function extractPDFFromZip(bytes) {
  const sig = [0x50,0x4B,0x03,0x04];
  let i = 0;
  while(i < bytes.length - 30) {
    if(bytes[i]===sig[0]&&bytes[i+1]===sig[1]&&bytes[i+2]===sig[2]&&bytes[i+3]===sig[3]) {
      const fnLen = bytes[i+26]|(bytes[i+27]<<8);
      const extraLen = bytes[i+28]|(bytes[i+29]<<8);
      const compSize = bytes[i+18]|(bytes[i+19]<<8)|(bytes[i+20]<<16)|(bytes[i+21]<<24);
      const fname = String.fromCharCode(...bytes.slice(i+30, i+30+fnLen));
      const dataStart = i+30+fnLen+extraLen;
      if(fname.toLowerCase().endsWith('.pdf')) return bytes.slice(dataStart, dataStart+compSize);
      i = dataStart + Math.max(compSize, 1);
    } else { i++; }
  }
  return null;
}

function parseAdaptibar(text, wrongOnly) {
  const questions = [];
  const blocks = text.split(/(?=Question\s*#\d+\s*[-\u2013])/);
  for(const block of blocks) {
    if(!/Question\s*#\d+/.test(block)) continue;
    const hm = block.match(/Question\s*#(\d+)\s*[-\u2013]\s*(.+?)\s*\/\s*(.+?)(?:\s*\(Simulated\))?\s*(?=Date Answered)/);
    if(!hm) continue;
    const num = hm[1], topic = hm[2].trim(), subtopic = hm[3].trim();
    const am = block.match(/You\s+(correctly answered|answered)\s+([A-D])\.?(?:\s+The correct answer is\s+([A-D]))?/);
    if(!am) continue;
    const gotRight = am[1] === 'correctly answered';
    const correct = am[3] || am[2];
    if(wrongOnly && gotRight) continue;
    const qm = block.match(/Question([A-Z][\s\S]+?)(?=\s*A[:.]\s)/);
    if(!qm) continue;
    let qText = qm[1].trim().replace(/(\w)-\n(\w)/g, '$1$2').replace(/ {2,}/g, ' ');
    const choices = {};
    for(const L of ['A','B','C','D']) {
      const cm = block.match(new RegExp('(?<![A-Za-z])' + L + '[):.:]\\s*([\\s\\S]+?)(?=\\s*(?:[A-D][):.:]\\s|Brief Explanation|(?<![a-z])Explanation(?=[A-Z\\n])|$))'));
      if(cm) { let ct = cm[1].trim().replace(/©[\s\S]+/, '').replace(/\n\d+\s*$/, '').replace(/(\w)-\n(\w)/g, '$1$2').replace(/\n/g, ' ').trim(); if(ct) choices[L] = ct; }
    }
    if(Object.keys(choices).length < 2) continue;
    const choicesStr = Object.entries(choices).sort().map(([l,t]) => l + ')  ' + t).join('\n\n');
    let explanation = '';
    const em = block.match(/(?:Brief Explanation|(?<![a-z])Explanation(?=[A-Z]))(.+?)(?=Extended Explanation|©|$)/s);
    if(em) { explanation = em[1].replace(/©[\s\S]+/, '').replace(/\n\d+\s*$/, '').replace(/\s+/g, ' ').trim(); }
    const rule = explanation.slice(0, 500);
    let takeaway = '';
    const tm = explanation.match(new RegExp(correct + '\\s+is correct[.\\s]+(.+?)(?=[A-D]\\s+is incorrect|[A-D]\\s+is correct|$)'));
    takeaway = tm ? tm[1].trim().slice(0, 350) : explanation.slice(0, 300);
    questions.push({ num, topic, subtopic, question: qText, choices: choicesStr, correct, rule, takeaway, notes: '', status: 'Not Started', mastered: 'No' });
  }
  return questions;
}

function parseAndPreviewText(text) {

  ssPendingImport = [];
  try {
    const q = parseQuestionText(text);
    if(!q) {
      const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
      const isBarbri = /\bResponses\b/i.test(text) || /this is the correct answer/i.test(text);
      const bulletLines = lines.filter(l => /^\*/.test(l) || /^[A-D]\s*$/.test(l));
      const choiceLines = lines.filter(l => /^\*\s*[A-D]\s*$/.test(l));
      statusEl.textContent = '⚠ Could not parse — see details below';
      previewEl.innerHTML = `<div style="background:var(--cream);border-radius:var(--radius);padding:16px;margin-top:12px;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.8"><div style="font-weight:600;margin-bottom:8px;color:var(--navy)">Parser diagnostic:</div><div>Lines total: <b>${lines.length}</b></div><div>BARBRI format detected: <b>${isBarbri}</b></div><div>Lines starting with *: <b>${bulletLines.length}</b></div><div>Choice bullet lines: <b>${choiceLines.length}</b></div><div style="margin-top:8px;color:var(--ink-soft)">First 8 non-empty lines:</div>${lines.slice(0,8).map((l,i)=>`<div style="color:var(--ink-mid)">${i}: <code>"${l.slice(0,80).replace(/</g,'&lt;')}"</code></div>`).join('')}</div>`;
      return;
    }
    const existingKeys = new Set(questions.map(q => q.num+'|'+q.topic+'|'+q.subtopic));
    const isNew = !existingKeys.has((q.num||'N/A')+'|'+q.topic+'|'+q.subtopic);
    ssPendingImport = [{...q, _isNew: isNew}];
    statusEl.textContent = isNew ? '✓ Question parsed — review below' : '⚠ This question may already be in your log';
    previewEl.innerHTML =
      `<div class="upload-preview" style="margin-top:16px">
        <div class="upload-preview-header">
          <h3 style="color:var(--white)">1 question parsed</h3>
          <div style="display:flex;gap:10px">
            ${isNew ? `<button class="btn btn-gold btn-sm" onclick="confirmSSImport()">Add to Log</button>` : `<button class="btn btn-gold btn-sm" onclick="confirmSSImport()">Add Anyway</button>`}
            <button class="btn btn-ghost btn-sm" onclick="cancelSSImport()">Clear</button>
          </div>
        </div>
        <div style="padding:16px 20px;display:flex;flex-direction:column;gap:10px">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft)">${q.topic} · ${q.subtopic}</div>
          <div style="font-size:13px;color:var(--ink);line-height:1.6">${(q.question||'').slice(0,200)}${q.question.length>200?'…':''}</div>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 10px;border-radius:10px;background:var(--green-pale);color:var(--green);font-weight:700">Answer: ${q.correct||'?'}</span>
          ${q.rule ? `<div style="font-size:12px;color:var(--ink-mid);background:var(--cream);padding:10px 12px;border-left:3px solid var(--gold);border-radius:0 var(--radius) var(--radius) 0">${q.rule.slice(0,300)}${q.rule.length>300?'…':''}</div>` : ''}
        </div>
      </div>
      <div style="margin-top:12px;text-align:right">
        <button class="btn btn-ghost btn-sm" onclick="openEditBeforeImport()">✏️ Edit before adding</button>
      </div>`;
  } catch(err) { statusEl.textContent = '⚠ Parse error: ' + err.message; previewEl.innerHTML = ''; }
}

function parseQuestionText(raw) {
  const text = raw
    .replace(/\r\n/g, '\n').replace(/\r/g, '\n')
    .replace(/[\u2018\u2019\u201a\u201b]/g, "'")
    .replace(/[\u201c\u201d\u201e\u201f]/g, '"')
    .replace(/[\u2013\u2014]/g, '-')
    .replace(/[\u2026]/g, '...');
  const lines = text.split('\n');
  const TOPICS = ['Civil Procedure','Constitutional Law','Contracts','Criminal Law','Evidence','Real Property','Torts'];
  let topic = 'Unknown', subtopic = 'Unknown';
  for(const t of TOPICS) { if(text.includes(t)) { topic = t; break; } }
  let num = 'N/A';
  const numM = text.match(/Question\s*#?\s*(\d+)/i) || text.match(/#(\d+)/);
  if(numM) num = numM[1];

  // Detect format: BARBRI/AdaptiBar formats — "* A" bullets OR plain "A Text" with Answer Discussion
  const isBarbri = /\bResponses\b/i.test(text) || /\*\s*[A-D]\s*\n/.test(text) ||
                   /this is the correct answer/i.test(text) || /^\*\s*[A-D]\s*$/m.test(text) ||
                   (/Answer Discussion/i.test(text) && /^[A-D]\s+\w/m.test(text));

  const choiceMap = {};
  let correct = '', questionBody = '', rule = '', takeaway = '';

  if(isBarbri) {
    // === BARBRI / AdaptiBar with "* A" bullet format ===

    // Bound question body at first choice line
    const firstStarLine = lines.findIndex(l => /^\*\s*[A-D]\s*$/.test(l.trim()));
    const responsesLine = lines.findIndex(l => /^\s*Responses\s*$/i.test(l.trim()));
    // For plain "A Text" format (no * bullets): find first line that looks like a choice
    const firstPlainChoiceLine = (firstStarLine < 0 && responsesLine < 0)
      ? lines.findIndex((l, idx) => idx > 0 && /^[A-D]\s+\S/.test(l.trim()) && l.trim().length < 200)
      : -1;
    const bodyEnd = firstStarLine > 0 ? firstStarLine
                  : responsesLine > 0 ? responsesLine
                  : firstPlainChoiceLine > 0 ? firstPlainChoiceLine
                  : 20;
    const bodyFiltered = lines.slice(0, bodyEnd).map(l => l.trim()).filter(l => l.length >= 5 && !TOPICS.includes(l));
    questionBody = bodyFiltered.join(' ').replace(/\s{2,}/g, ' ').trim();

    // Subtopic: first short, non-choice, non-topic line — only look before the choices start
    const topLines = lines.slice(0, Math.max(bodyEnd, 4)).map(l => l.trim()).filter(Boolean);
    for(const line of topLines.slice(0, 8)) {
      if(line.length > 3 && line.length < 80 && !TOPICS.includes(line) &&
         !/^\s*Responses\s*$/i.test(line) && !/^\*\s*[A-D]/.test(line) &&
         !/^[A-D]\s/.test(line) && !/answer/i.test(line)) {
        subtopic = line; break;
      }
    }

    // Parse choices
    let i = 0;
    while(i < lines.length) {
      const t = lines[i].trim();

      // "* A" bullet on its own line — choice text on the next line
      const starM = t.match(/^\*\s*([A-D])\s*$/);
      if(starM) {
        const letter = starM[1];
        let j = i + 1;
        while(j < lines.length && !lines[j].trim()) j++;
        if(j < lines.length) {
          let choiceText = lines[j].trim();
          const isCorrectLine = /this is the correct answer/i.test(choiceText) || /\s-\s*correct\s*$/i.test(choiceText);
          choiceText = choiceText.replace(/\s*-\s*(not selected,?\s*)?(this is the correct answer|correct|incorrect|no response given)\s*$/i, '').trim();
          if(choiceText.length > 1) choiceMap[letter] = choiceText;
          if(isCorrectLine) correct = letter;
          // Also check the line immediately after the choice text
          if(j+1 < lines.length) {
            const nextLine = lines[j+1].trim();
            if(/this is the correct answer/i.test(nextLine) || /^correct\s*$/i.test(nextLine) || /\s-\s*correct\s*$/i.test(nextLine)) correct = letter;
          }
        }
        i = j + 1; continue;
      }

      // Tab-separated "A\tText" format
      const tabM = lines[i].match(/^([A-D])\t(.+)$/s);
      if(tabM) {
        const letter = tabM[1]; let body = tabM[2];
        if(/this is the correct answer/i.test(body) || /\s-\s*correct\s*$/i.test(body)) correct = letter;
        body = body.replace(/\s*-\s*(not selected,?\s*)?(this is the correct answer|correct|incorrect|no response given)\s*$/i, '').trim();
        let deduped = body;
        for(let s = Math.floor(body.length * 0.3); s < body.length * 0.7; s++) {
          const a = body.slice(0, s).trim(), b2 = body.slice(s).trim();
          if(a.length > 5 && b2.startsWith(a.slice(0, 15))) { deduped = a; break; }
        }
        if(deduped.length > 2 && !choiceMap[letter]) choiceMap[letter] = deduped;
        i++; continue;
      }

      // Plain "A ChoiceText" inline (no bullet) — only within the choices section
      const inlineM = t.match(/^([A-D])\s+(.+)$/s);
      if(inlineM && !/^\*/.test(t) && i > bodyEnd) {
        const letter = inlineM[1]; let body = inlineM[2];
        if(/this is the correct answer/i.test(body) || /\s-\s*correct\s*$/i.test(body)) correct = letter;
        body = body.replace(/\s*-\s*(not selected,?\s*)?(this is the correct answer|correct|incorrect|no response given)\s*$/i, '').trim();
        let deduped = body;
        for(let s = Math.floor(body.length * 0.3); s < body.length * 0.7; s++) {
          const a = body.slice(0, s).trim(), b2 = body.slice(s).trim();
          if(a.length > 5 && b2.startsWith(a.slice(0, 15))) { deduped = a; break; }
        }
        if(deduped.length > 2 && !choiceMap[letter]) choiceMap[letter] = deduped;
      }
      i++;
    }

    // Extract explanation / rule
    const expM = text.match(/Answer Discussion\s*[-\u2013]\s*(?:Incorrect|Correct)[^\n]*\n([\s\S]{30,2000})/i) ||
                 text.match(/Answer Discussion[^\n]*\n([\s\S]{30,2000})/i);
    if(expM) {
      rule = expM[1].replace(/\s+/g,' ').trim().slice(0, 700);
      const firstSentence = rule.match(/^.+?[.!?](?:\s|$)/);
      takeaway = firstSentence ? firstSentence[0].trim() : rule.slice(0, 300);

      // Resolve correct answer from explanation if not found inline
      if(!correct) {
        const expText = expM[1];
        // Try "(A) is correct" style
        const corrDirect = expText.match(/\(([A-D])\)\s+is\s+(?:the\s+)?correct/i) ||
                           expText.match(/correct\s+answer\s+is\s+\(?([A-D])\)?/i);
        if(corrDirect) {
          correct = corrDirect[1].toUpperCase();
        } else {
          // Subtract letters explicitly labeled incorrect — handles "(A) is incorrect", "(A) and (B) are incorrect", etc.
          const incorrectSet = new Set();
          for(const sentence of expText.split(/\.(?:\s|$)/)) {
            if(/\bincorrect\b/i.test(sentence)) {
              for(const m of sentence.matchAll(/\(([A-D])\)/gi)) incorrectSet.add(m[1].toUpperCase());
            }
          }
          const remaining = ['A','B','C','D'].filter(l => !incorrectSet.has(l) && choiceMap[l]);
          if(remaining.length === 1) {
            correct = remaining[0];
          } else if(remaining.length > 1) {
            // First letter mentioned in explanation without "incorrect"
            const firstLetter = expText.match(/\(([A-D])\)/);
            if(firstLetter && !incorrectSet.has(firstLetter[1])) correct = firstLetter[1].toUpperCase();
          }
        }
      }
    }

  } else {
    // === Generic / non-BARBRI format ===
    for(const line of lines.slice(0, 8)) {
      const t = line.trim();
      if(t.length > 3 && t.length < 80 && !TOPICS.includes(t) && !/^[A-D][\)\.:]/.test(t) && !/answer/i.test(t)) { subtopic = t; break; }
    }
    const choiceRe = /\b([A-D])\s*[\)\.\:]\s*(.+?)(?=\n\s*[A-D]\s*[\)\.\:]|\n\s*Answer|\n\s*Explanation|$)/gs;
    let m;
    while((m = choiceRe.exec(text)) !== null) { const body = m[2].replace(/\n/g,' ').trim(); if(body.length > 2 && body.length < 400) choiceMap[m[1]] = body; }
    const corrM = text.match(/(?:correct answer is|answer is|answer:)\s*([A-D])/i) || text.match(/\b([A-D])\s+is\s+(?:the\s+)?correct/i);
    if(corrM) correct = corrM[1].toUpperCase();
    const firstChoiceIdx = text.search(/\n\s*[A-D]\s*[\)\.\:]/);
    const bodyRaw = firstChoiceIdx > 0 ? text.slice(0, firstChoiceIdx) : text.slice(0, 800);
    questionBody = bodyRaw.split('\n').filter(l => { const t=l.trim(); return t.length>20 && !TOPICS.includes(t) && !/^#?\d+/.test(t); }).join(' ').replace(/\s{2,}/g,' ').trim();
    const expM = text.match(/(?:Answer Discussion|Explanation)[^\n]*\n([\s\S]{30,1200})/i);
    if(expM) { rule = expM[1].replace(/\s+/g,' ').trim().slice(0, 700); takeaway = rule.slice(0, 300); }
  }

  if(Object.keys(choiceMap).length < 2) return null;
  if(!questionBody || questionBody.length < 5) return null;
  const choicesStr = Object.entries(choiceMap).sort().map(([l,t])=>`${l})  ${t}`).join('\n\n');
  return { num, topic, subtopic, question: questionBody, choices: choicesStr, correct, rule, takeaway, notes: '', status: 'Not Started', mastered: 'No' };
}

// ── SPACED REPETITION ENGINE ───────────────────────────────────────
// Each question gets: srDue (ISO date string), srInterval (days), srEase (float)
const SR_DEFAULTS = { srDue: null, srInterval: 1, srEase: 2.5 };

function getSRData(q) {
  return { srDue: q.srDue||null, srInterval: q.srInterval||1, srEase: q.srEase||2.5 };
}

// SM-2 algorithm: rating 0=Again, 1=Hard, 2=Good, 3=Easy
function srRate(idx, rating) {
  const q = questions[idx];
  let { srInterval, srEase } = getSRData(q);
  const now = new Date();
  if(rating === 0) { srInterval = Math.floor(Math.random()*2)+2; } // Again → 2-3 days (prioritized, not tomorrow)
  else if(rating === 1) { srInterval = Math.max(2, Math.round(srInterval * 1.2)); srEase = Math.max(1.3, srEase - 0.15); }
  else if(rating === 2) { srInterval = Math.round(srInterval * srEase); }
  else { srInterval = Math.round(srInterval * srEase * 1.3); srEase = Math.min(3.5, srEase + 0.1); }
  srInterval = Math.min(srInterval, 60);
  const due = new Date(now); due.setDate(due.getDate() + srInterval);
  questions[idx] = { ...q, srDue: due.toISOString().slice(0,10), srInterval, srEase };
  save();
}

const SR_DAILY_LIMIT = 10;
function getDueQuestions() {
  const today = new Date().toISOString().slice(0,10);
  const all = questions.filter(q => !q.srDue || q.srDue <= today);
  all.sort((a,b) => {
    const ap = a.status==='More Practice Needed'?0:a.status==='Not Started'?1:2;
    const bp = b.status==='More Practice Needed'?0:b.status==='Not Started'?1:2;
    if(ap!==bp) return ap-bp;
    return (a.srDue||'0000').localeCompare(b.srDue||'0000');
  });
  return all.slice(0, SR_DAILY_LIMIT);
}

function getDueSoon() {
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  const ts = tomorrow.toISOString().slice(0,10);
  return questions.filter(q => q.srDue && q.srDue <= ts && q.srDue > new Date().toISOString().slice(0,10));
}

function srDayLabel(q) {
  if(!q.srDue) return 'New';
  const today = new Date().toISOString().slice(0,10);
  if(q.srDue <= today) return 'Due';
  const d = Math.ceil((new Date(q.srDue)-new Date())/(864e5));
  return 'In '+d+'d';
}

// ── SMART SHUFFLE (weighted by status) ────────────────────────────
function buildWeightedPool() {
  const pool = [];
  questions.forEach(q => {
    const w = q.mastered==='Yes' ? 0
             : q.status==='More Practice Needed' ? 3
             : q.status==='Reviewed' ? 1
             : 2; // Not Started
    for(let i=0;i<w;i++) pool.push(q);
  });
  // shuffle
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  // deduplicate while preserving weight-bias order
  const seen=new Set(), result=[];
  for(const q of pool){ const k=q.num+'|'+q.topic+'|'+q.subtopic; if(!seen.has(k)){seen.add(k);result.push(q);} }
  return result;
}

// ── PRACTICE STATE ─────────────────────────────────────────────────

}

function shuffleArr(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function openSprintModal() { document.getElementById('sprint-modal').classList.add('open'); }
function closeSprintModal() { document.getElementById('sprint-modal').classList.remove('open'); }
function launchSprint() {
  const topic = document.getElementById('sprint-topic').value;
  const count = Math.max(1, parseInt(document.getElementById('sprint-count').value)||20);
  const timed = document.getElementById('sprint-timed').value === '1';
  let pool = topic ? questions.filter(q=>q.topic===topic) : [...questions];
  pool = shuffleArr(pool).slice(0, count);
  closeSprintModal();
  startPractice(timed ? 'sprint-timed' : 'sprint', pool);
}

function renderPracticeCard() {
  const area = document.getElementById('practice-area');
  if(!area) return;
  const ps = practiceSession;

  if(ps.idx >= ps.queue.length) {
    if(ps.timerInterval) clearInterval(ps.timerInterval);
    const pct = ps.queue.length ? Math.round(ps.score/ps.queue.length*100) : 0;
    area.innerHTML = '<div class="card" style="margin-top:20px"><div class="card-body" style="text-align:center;padding:48px 36px">'+
      '<div style="font-family:\'Playfair Display\',serif;font-size:64px;font-weight:900;color:var(--gold);line-height:1">'+pct+'%</div>'+
      '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-soft);margin-top:4px">Session Score</div>'+
      '<h2 style="font-family:\'Playfair Display\',serif;font-size:26px;color:var(--navy);margin-top:20px">'+(pct>=70?'Strong work. Keep grinding.':'Keep at it — repetition wins.')+'</h2>'+
      '<p style="color:var(--ink-soft);margin-top:8px">'+ps.score+' correct out of '+ps.queue.length+'</p>'+
      '<div style="display:flex;gap:12px;justify-content:center;margin-top:28px">'+
      '<button class="btn btn-primary" onclick="renderPracticePage()">New Session</button>'+
      '<button class="btn btn-ghost" onclick="switchPage(\'log\')">Review Log</button>'+
      '</div></div></div>';
    return;
  }

  const q = ps.queue[ps.idx];
  const choices = parseChoices(q.choices);
  const prog = ps.idx / ps.queue.length * 100;
  const qIdx = questions.indexOf(q);
  const modeLabel = ps.mode==='due'?'📅 Due Today':ps.mode==='smart'?'⚖️ Smart Shuffle':ps.mode==='weak'?'🔥 Weak Spots':'🏃 Sprint';
  const srLabel = srDayLabel(q);
  const srClass = srLabel==='Due'?'sr-due':srLabel==='New'?'sr-new':'sr-soon';

  // timed setup
  if(ps.mode==='sprint-timed' && !ps.answered) {
    if(ps.timerInterval) clearInterval(ps.timerInterval);
    ps.secondsLeft = 108; ps.totalTime = 108;
    ps.timerInterval = setInterval(()=>{
      ps.secondsLeft--;
      const fill = document.getElementById('timed-fill');
      const clock = document.getElementById('timed-clock');
      if(fill) { fill.style.width=(ps.secondsLeft/ps.totalTime*100)+'%'; if(ps.secondsLeft<30)fill.classList.add('danger'); else fill.classList.remove('danger'); }
      if(clock) clock.textContent = Math.floor(ps.secondsLeft/60)+':'+(ps.secondsLeft%60).toString().padStart(2,'0');
      if(ps.secondsLeft<=0) { clearInterval(ps.timerInterval); autoAdvancePractice(qIdx); }
    }, 1000);
  }

  area.innerHTML = '<div class="card" style="margin-top:20px;overflow:hidden">'+
    '<div style="background:var(--navy);padding:12px 20px;display:flex;justify-content:space-between;align-items:center">'+
    '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold-light)">'+modeLabel+'</span>'+
    '<div style="display:flex;gap:10px;align-items:center">'+
    '<span class="sr-badge '+srClass+'">'+srLabel+'</span>'+
    '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;color:rgba(255,255,255,0.5)">'+(ps.idx+1)+' / '+ps.queue.length+' · '+ps.score+' correct</span>'+
    '</div></div>'+
    // progress bar
    '<div style="height:4px;background:var(--cream-dark)"><div style="height:100%;width:'+prog+'%;background:var(--gold);transition:width 0.4s"></div></div>'+
    // timer (sprint-timed only)
    (ps.mode==='sprint-timed'&&!ps.answered?'<div style="padding:8px 20px 0"><div class="timed-clock" id="timed-clock">1:48</div><div class="timed-bar"><div class="timed-fill" id="timed-fill" style="width:100%"></div></div></div>':'')+
    // topic + question
    '<div style="padding:20px 24px 0">'+
    '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink-soft);margin-bottom:8px">'+q.topic+' · '+q.subtopic+'</div>'+
    '<div style="font-size:14px;line-height:1.75;color:var(--ink);white-space:pre-wrap">'+q.question+'</div>'+
    '</div>'+
    // choices
    '<div style="padding:16px 24px;display:flex;flex-direction:column;gap:8px" id="practice-choices">'+
    choices.map(c=>'<div class="fc-choice" id="pc-'+c.letter+'" onclick="selectPracticeChoice(\''+c.letter+'\',\''+q.correct+'\','+qIdx+')"><strong style="min-width:18px;font-family:\'IBM Plex Mono\',monospace;font-size:11px;color:var(--navy)">'+c.letter+')</strong><span>'+c.text+'</span></div>').join('')+
    '</div>'+
    // answer area (hidden until answered)
    '<div id="practice-answer" style="display:none;padding:0 24px 16px">'+
    '<div style="background:var(--green-pale);border:1.5px solid var(--green);border-radius:var(--radius);padding:10px 16px;font-family:\'IBM Plex Mono\',monospace;font-weight:700;font-size:16px;color:var(--green);letter-spacing:2px;margin-bottom:12px">✓ '+q.correct+'</div>'+
    (q.rule?'<div style="background:var(--cream);border-left:3px solid var(--gold);padding:12px 14px;border-radius:0 var(--radius) var(--radius) 0;font-size:13px;line-height:1.65;margin-bottom:8px">'+q.rule+'</div>':'')+
    (q.takeaway?'<div style="background:var(--blue-pale);border-left:3px solid #1976d2;padding:12px 14px;border-radius:0 var(--radius) var(--radius) 0;font-size:13px;line-height:1.65">'+q.takeaway+'</div>':'')+
    '</div>'+
    // footer: SR rating buttons (shown after answer) or next button
    '<div class="sr-rating-bar" id="practice-footer">'+
    '<span class="sr-label">Rate:</span>'+
    '<button class="sr-btn sr-btn-again" id="sr-again" onclick="ratePractice(0,'+qIdx+')" style="display:none">🔁 Prioritize</button>'+
    '<button class="sr-btn sr-btn-hard" id="sr-hard" onclick="ratePractice(1,'+qIdx+')" style="display:none">😓 Hard</button>'+
    '<button class="sr-btn sr-btn-good" id="sr-good" onclick="ratePractice(2,'+qIdx+')" style="display:none">👍 Good</button>'+
    '<button class="sr-btn sr-btn-easy" id="sr-easy" onclick="ratePractice(3,'+qIdx+')" style="display:none">⚡ Easy</button>'+
    '<button class="btn btn-sm btn-ghost" id="pr-next" onclick="nextPractice()" style="display:none;margin-left:auto">Next →</button>'+
    '</div>'+
    '</div>';
}

function selectPracticeChoice(letter, correct, qIdx) {
  if(practiceSession.answered) return;
  if(practiceSession.timerInterval) clearInterval(practiceSession.timerInterval);
  practiceSession.answered = true;
  const ok = letter === correct;
  if(ok) practiceSession.score++;

  document.querySelectorAll('.fc-choice').forEach(el=>el.style.pointerEvents='none');
  const sel = document.getElementById('pc-'+letter);
  if(sel) sel.classList.add(ok?'selected-correct':'selected-wrong');
  if(!ok) { const c=document.getElementById('pc-'+correct); if(c)c.classList.add('reveal-correct'); }

  document.getElementById('practice-answer').style.display = 'block';
  ['sr-again','sr-hard','sr-good','sr-easy','pr-next'].forEach(id=>{
    const el=document.getElementById(id); if(el)el.style.display='inline-block';
  });
  // Auto-update question status
  if(qIdx>=0) {
    if(!ok && questions[qIdx].status!=='More Practice Needed') { questions[qIdx].status='More Practice Needed'; save(); }
    else if(ok && questions[qIdx].status==='Not Started') { questions[qIdx].status='Reviewed'; save(); }
  }
}

function autoAdvancePractice(qIdx) {
  if(practiceSession.answered) return;
  practiceSession.answered = true;
  document.querySelectorAll('.fc-choice').forEach(el=>el.style.pointerEvents='none');
  const c = document.getElementById('pc-'+practiceSession.queue[practiceSession.idx].correct);
  if(c) c.classList.add('reveal-correct');
  document.getElementById('practice-answer').style.display='block';
  ['sr-again','sr-hard','sr-good','sr-easy','pr-next'].forEach(id=>{ const el=document.getElementById(id); if(el)el.style.display='inline-block'; });
  srRate(qIdx, 0); // time-out = Prioritize (2-3 days)
}

function ratePractice(rating, qIdx) {
  if(qIdx >= 0) srRate(qIdx, rating);
  nextPractice();
}

function nextPractice() {
  practiceSession.idx++;
  practiceSession.answered = false;
  if(practiceSession.timerInterval) clearInterval(practiceSession.timerInterval);
  practiceSession.timerInterval = null;
  renderPracticeCard();
}
