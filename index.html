<script>
const QUESTIONS_DATA = [{"num": "2317", "topic": "Civil Procedure", "subtopic": "Appealability and Review", "question": "A commercial landlord sued his former tenant in federal court, asserting that the tenant caused substantial damage to the leased premises, resulting in $80,000 worth of damages. The landlord also asserted a claim for slander due to allegedly defamatory remarks that the tenant made to prospective future tenants. The tenant counterclaimed for slander, alleging the landlord made it difficult for the tenant to find a suitable new location for its operations. The tenant also sought recovery of her security deposit.\n\nAfter discovery, the landlord and the tenant filed cross-motions for summary judgment on the damage to the premises and security deposit claims. The court granted summary judgment for the landlord on both claims. The parties' respective claims for slander were set for trial. The landlord requested the district court immediately enter a final judgment as to the damages and security deposit claims so the landlord could collect the money due. The tenant opposed this request, providing evidence of the hardship she would suffer if she had to pay the full amount of the damages immediately when that amount might be reduced by the decisions on the respective claims for slander.\n\nShould the court grant the landlord's motion for a partial final judgment?", "choices": "A)  No, because final judgment may not be entered until all claims in the case have been fully adjudicated.\n\nB)  No, because the tenant demonstrated hardship with the potential of the undue burden the appellate court would face if it were required to hear the case twice.\n\nC)  Yes, because the claims at issue have been fully heard and decided on the merits.\n\nD)  Yes, because there is no just reason for the court to delay the entry of a final judgment.", "correct": "B", "rule": "FRCP 54(b): Court may enter partial final judgment only if it expressly finds 'no just reason for delay.' Courts strongly disfavor piecemeal appeals. Multiple reasons to delay here: tenant hardship, possible offset from slander claims, and burden on appellate court.", "takeaway": "'No just reason for delay' must be affirmatively found — if any reason to delay exists (hardship, potential offset, piecemeal appeal risk), the motion should be DENIED.", "notes": "", "status": "More Practice Needed", "mastered": "No"}, {"num": "2233", "topic": "Civil Procedure", "subtopic": "Jurisdiction and Venue", "question": "A client sued his former attorney in federal court for malpractice. The client had retained the attorney to file and prosecute U.S. patent applications. The client alleged that if the attorney had not omitted from the client's patent application a portion of the computer source code for the client's invention, the resulting U.S. patent would not have been held invalid for indefiniteness. The malpractice claim requires analysis of U.S. patent law and proof of the patent's invalidity. Claims arising under U.S. patent law are within the exclusive jurisdiction of the federal courts. In response to the former client's complaint, the attorney moved to dismiss for lack of subject-matter jurisdiction.\n\nIs the court likely to grant the attorney's motion to dismiss?", "choices": "A)  No, because the client's right to relief depends on the resolution of a substantial, disputed question of federal law.\n\nB)  No, because federal patent law completely preempts the client's malpractice claim.\n\nC)  Yes, because the claim cannot arise under federal law given that it is based on state law.\n\nD)  Yes, because the claim does not sufficiently raise a substantial, disputed question of federal law to support federal jurisdiction.", "correct": "D", "rule": "Gunn v. Minton (2013): An embedded federal issue supports federal question jurisdiction only if it is (1) necessarily raised, (2) actually disputed, (3) substantial, and (4) capable of resolution without disrupting the federal-state balance. Patent malpractice presents only a hypothetical patent question — not substantial enough.", "takeaway": "State malpractice + incidental patent question ≠ federal jurisdiction. The federal issue must be outcome-determinative, not merely hypothetical or collateral.", "notes": "Remember that a federal question claim is one where the plaintiff is arguing for a federal right, not just that a federal law is invoked by their claim. Any cases related to malpractice is a state law claim, regardless of what the underlying case was about.   ", "status": "Reviewed", "mastered": "No"}, {"num": "2278", "topic": "Civil Procedure", "subtopic": "Jury Trials", "question": "A woman filed a personal injury action in federal court in State A against a former neighbor for assault and battery and sought money damages. The neighbor timely requested a jury trial. The court used voter registration lists to determine the jury array, resulting in a jury panel consisting of 90% women. During voir dire, potential jurors were asked: 'Have you ever been a victim of a crime that would be relevant to your ability to be impartial in this case?' Two potential jurors were dismissed for cause after revealing that they had recently been victims of assault.\n\nAnother potential juror did not reveal that she had been assaulted 20 years earlier, believing it was not relevant to her ability to be impartial. She was seated on the petit jury. Two days into trial, one juror became seriously ill and could not continue. The remaining 11 jurors deliberated and returned a verdict for the woman. After trial, the neighbor's attorney learned about the juror's undisclosed prior assault.\n\nWhich argument for the neighbor's attorney will obtain a reversal of the judgment?", "choices": "A)  The verdict violated the neighbor's Seventh Amendment right to a jury trial because the jury panel did not represent a fair cross-section of the community.\n\nB)  The verdict cannot stand because a juror failed to respond accurately in voir dire and, had she done so, she would have been subject to challenge for cause.\n\nC)  The verdict cannot stand because only 11 of the 12 jurors agreed and no alternative juror was substituted for the juror who became ill.\n\nD)  There is no argument related to the jury that would warrant reversal of the verdict and the judgment for the woman.", "correct": "D", "rule": "FRCP 48: minimum 6 jurors (Ballew v. Georgia). Voter reg lists = valid pool. McDonough test: juror must have (1) failed to answer honestly AND (2) correct answer would have provided cause for challenge. Innocent misunderstanding ≠ bad faith. No alternate jurors in federal civil system.", "takeaway": "All three apparent arguments fail: voter lists are valid; innocent non-disclosure ≠ new trial grounds; 11 jurors is fine (min = 6). The answer is no winning argument exists.", "notes": "There must be at least 6 jurors and no more than 12 jurors in a case. If a juror makes a good faith misstatement based on misunderstanding, there is no cause for challenge. Had the juror purposefully lied, there would be a cause for challenge.  ", "status": "More Practice Needed", "mastered": "No"}, {"num": "2290", "topic": "Civil Procedure", "subtopic": "Motions", "question": "A truck driver from State A filed a proper diversity suit against a manufacturer from State B in federal court in State A. Before answering the truck driver's complaint, the manufacturer timely filed a motion to dismiss for lack of personal jurisdiction. The truck driver then filed a response detailing the manufacturer's minimum contacts in State A. The manufacturer then made a second pre-answer motion claiming improper venue.\n\nIs the court likely to consider the manufacturer's claim for improper venue?", "choices": "A)  Yes, because a party may raise the defense of improper venue at any time.\n\nB)  Yes, because a party does not need to raise the defense of improper venue in their initial pre-answer motion.\n\nC)  No, because the manufacturer waived this defense by not raising it in its initial pre-answer motion.\n\nD)  No, because the truck driver's answer establishes that the manufacturer has minimum contacts in State A, so the court may presume that venue is proper.", "correct": "C", "rule": "FRCP 12(g) & 12(h): The following defenses are WAIVED if omitted from the first pre-answer motion: lack of personal jurisdiction, improper venue, insufficient process, and insufficient service of process.", "takeaway": "File ALL waivable 12(b) defenses in your FIRST pre-answer motion. Miss one = permanently waived.", "notes": "Venue, personal jurisdiction, insufficient process, and insufficient service of process are WAIVED, if not used in pre-answer motion. ", "status": "Reviewed", "mastered": "No"}, {"num": "2199", "topic": "Civil Procedure", "subtopic": "Motions", "question": "A handyman filed a diversity action against a homeowner in federal court in State A. The handyman alleged that the homeowner failed to pay $150,000 owed on a valid service contract for the installation of a bathroom. Discovery concluded in March.\n\nAt the one-day trial in October, the homeowner disputed the contract's validity, testifying before a jury that the handyman had installed the bathroom as a gift and that the exchanged emails referring to a 'contract' between the parties had been in jest. After the close of evidence, the court issued jury instructions, and the jury deliberated for 15 minutes before returning a verdict for the homeowner.\n\nWhich motion should the handyman's attorney file to challenge the verdict?", "choices": "A)  Motion for judgment as a matter of law.\n\nB)  Motion for summary judgment.\n\nC)  Motion to dismiss based on lack of personal jurisdiction.\n\nD)  Motion for a new trial.", "correct": "D", "rule": "JMOL (Rule 50(a)): must be made before jury deliberates. MSJ (Rule 56): within 30 days after close of discovery. Motion for New Trial (Rule 59): after verdict — proper when verdict is against the great weight of the evidence.", "takeaway": "Post-verdict = Motion for New Trial. JMOL closed when jury started deliberating. MSJ closed 7 months ago. After a verdict is returned, the only vehicle is Rule 59.", "notes": "Standard for Motion for a New Trial: The verdict is against the weight of the evidence.", "status": "Reviewed", "mastered": "No"}, {"num": "2261", "topic": "Civil Procedure", "subtopic": "Pretrial Procedures", "question": "A former executive sued a corporation, alleging that the corporation fired the executive because of his advanced age. The executive served notice of a deposition for the corporation by serving the corporation's president. The president informed the corporation's counsel that she had no personal knowledge of the executive's employment or termination and that having to appear for her deposition places an undue and unnecessary burden on her and the corporation.\n\nIs the corporation likely to prevent the deposition from occurring?", "choices": "A)  Yes, because the president is not a defendant and was not subpoenaed.\n\nB)  Yes, because the president may seek a protective order excusing her from being deposed.\n\nC)  No, because the corporation may designate someone else to replace the president as the deponent.\n\nD)  No, because as the president, she has knowledge of material facts known to the corporation's employees and agents.", "correct": "B", "rule": "FRCP 30(b)(6): deposition notice naming an organization must 'describe with reasonable particularity the matters for examination.' No particularity = defective notice = basis for protective order under FRCP 26(c).", "takeaway": "When deposing a corporation, specify the TOPICS, not just a person. Failure to state matters with reasonable particularity = protective order.", "notes": "When deposing a corporation, the basis of the deposition must be clear otherwise there is no particularity, and the other party can get a protective order preventing the deposition from happening.", "status": "More Practice Needed", "mastered": "No"}, {"num": "2221", "topic": "Civil Procedure", "subtopic": "Verdicts and Judgments", "question": "A driver, a citizen of State A, filed a lawsuit against a trucker, a citizen of State B, in federal court in State B. The driver sought compensation for damages to his automobile. A jury found, pursuant to a special verdict, that the trucker had been speeding and ran a red light, awarding the driver $95,000.\n\nSix months later, a man who had also been involved in the same car accident filed a jurisdictionally valid lawsuit against the trucker in the same federal court to recover for his injuries. The man filed a motion for partial summary judgment, arguing that the prior suit had already determined the trucker's negligence.\n\nIs the court likely to grant the man's motion for partial summary judgment?", "choices": "A)  No, because non-mutual offensive collateral estoppel is not available to the man on the issue of the trucker's negligence.\n\nB)  No, because there are not enough facts to determine whether the man may use non-mutual offensive collateral estoppel.\n\nC)  Yes, because claim preclusion bars relitigation of the issue of the trucker's negligence.\n\nD)  Yes, because non-mutual offensive collateral estoppel states that the trucker's negligence has already been determined.", "correct": "B", "rule": "Parklane Hosiery v. Shore (1979): Non-mutual offensive collateral estoppel requires a case-by-case 7-factor analysis. Cannot grant OR deny definitively without doing the analysis first.", "takeaway": "Don't assume NMOCE applies or doesn't. Parklane requires factor analysis. Insufficient facts = deny the motion without prejudice.", "notes": "Non-mutual Offensive Collateral Estoppel Fairness Factors: 1) Party to be bound by decision in Case 2 had full and fair opportunity to litigate the issue in Case 1, 2) The party to be bound had proper incentive to litigate the issue in Case 1, 3) Whether the party asserting the preclusion could have easily joined Case 1 (e.g., if they could have easily joined Case 1, the court may not allow you to use the preclusion offensively), 4) There have been no inconsistent issues on the findings (e.g., multiple cases about someone's negligence and in some they are found negligent and in others they are not, then the court in Case 2 would likely not allow for offensive use of the preclusion).  ", "status": "More Practice Needed", "mastered": "No"}, {"num": "1824", "topic": "Civil Procedure", "subtopic": "Verdicts and Judgments", "question": "A motorcyclist was involved in a collision with a truck. The motorcyclist sued the truck driver in state court for damage to the motorcycle. The jury returned a verdict for the truck driver, and the court entered judgment. The motorcyclist then sued the company that employed the driver and owned the truck in federal court for personal-injury damages, and the company moved to dismiss based on the state-court judgment.\n\nIf the court grants the company's motion, what is the likely explanation?", "choices": "A)  Claim preclusion (res judicata) bars the motorcyclist's action against the company.\n\nB)  Issue preclusion (collateral estoppel) establishes the company's lack of negligence.\n\nC)  The motorcyclist violated the doctrine of election of remedies.\n\nD)  The state-court judgment is the law of the case.", "correct": "A", "rule": "Claim preclusion: bars splitting a cause of action. One accident = one cause of action; all claims must be brought together. Employer-employee = privity, so judgment for employee bars later suit against employer.", "takeaway": "One accident = one lawsuit. Bring ALL claims at once. Employer/employee are in privity — a win for the employee bars suit against the employer.", "notes": "Since the employer and employee are considered to be in privity, the claim is barred under res judicata. ", "status": "More Practice Needed", "mastered": "No"}, {"num": "1352", "topic": "Constitutional Law", "subtopic": "Individual Rights", "question": "A city passed an ordinance requiring individuals to obtain a license in order to care for children under the age of 12 for pay. City officials said the licensing process would ensure that child-care workers were adequately regulated for the health and safety of the city's children. To receive a license, an individual must complete 10 hours of instruction in child care, undergo a background check, and pay a $100 fee. The ordinance affects women disproportionately to men, because female child-care workers far outnumber male child-care workers in the city.\n\nIs the ordinance constitutional?", "choices": "A)  No, because it has a disparate impact on women without a showing that the ordinance is necessary to serve a compelling government interest.\n\nB)  No, because it infringes on the freedom of contract without a compelling government interest.\n\nC)  Yes, because any burden it imposes is clearly outweighed by an important government objective.\n\nD)  Yes, because it is rationally related to a legitimate government objective.", "correct": "D", "rule": "Geduldig v. Aiello: Discriminatory EFFECT alone does not trigger heightened scrutiny. Need discriminatory INTENT/PURPOSE to get intermediate scrutiny (sex) or strict scrutiny (race). Without intent, even severe disparate impact = rational basis only.", "takeaway": "Disparate impact ≠ discrimination under Equal Protection. Only discriminatory PURPOSE triggers heightened review.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "607", "topic": "Constitutional Law", "subtopic": "Separation of Powers", "question": "A federal statute prohibits the sale or resale, in any place in this country, of any product intended for human consumption or ingestion into the human body that contains designated chemicals known to cause cancer, unless the product is clearly labeled as dangerous.\n\nThe constitutionality of this federal statute may most easily be justified on the basis of the power of Congress to:", "choices": "A)  regulate commerce among the states.\n\nB)  enforce the Fourteenth Amendment.\n\nC)  provide for the general welfare.\n\nD)  promote science and the useful arts.", "correct": "A", "rule": "Commerce Clause = broadest regulatory power. Spending Clause = authorizes spending FOR general welfare, NOT direct regulation. 14th Amendment = state action only. Patent/Copyright Clause = exercised through patents/copyrights, not product regulation.", "takeaway": "Default to Commerce Clause for federal economic regulation. Congress can SPEND for general welfare but cannot REGULATE directly under it.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1302", "topic": "Criminal Law", "subtopic": "Constitutional Protection of Accused Persons", "question": "A defendant was lawfully arrested for bank robbery, without an arrest warrant. He was not given Miranda warnings but was immediately taken to a police station, where he and five other men were placed in a lineup to be viewed by the bank teller who had been on duty at the time of the robbery. Each man was required to say the words spoken by the bank robber: 'Give me all your money. I've got a gun.' After all the men in the lineup spoke those words, the teller identified the defendant as the robber.\n\nThe defendant subsequently moved to suppress the teller's testimony, claiming that the lineup violated his privilege against self-incrimination. At the suppression hearing, the teller testified that she had not gotten a good look at the robber's face because the robber had been wearing a hat, but that she was certain the defendant was the robber because she had recognized his voice.\n\nShould the defendant's motion be granted?", "choices": "A)  No, because being required to speak at the lineup, while compelled, was not testimonial or communicative.\n\nB)  No, because testimony of a witness based on firsthand observation is not subject to exclusion as the fruit of the poisonous tree.\n\nC)  Yes, because the defendant was compelled to speak at the lineup, and this compelled speech led to the witness's identification testimony.\n\nD)  Yes, because the defendant was never informed that he could refuse to make a statement and that any statement could be used as evidence against him.", "correct": "A", "rule": "5th Amendment protects only TESTIMONIAL communications. Physical characteristics (voice, handwriting, blood) are NOT testimonial even if compelled. US v. Wade; US v. Hubbell.", "takeaway": "Compelled ≠ testimonial. Physical acts revealing characteristics are not protected by the 5th Amendment.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1033", "topic": "Criminal Law", "subtopic": "Constitutional Protection of Accused Persons", "question": "The legislature of a state is debating reforms in the law governing insanity. Two reforms have been proposed. Proposal A would eliminate the insanity defense altogether. Proposal B would retain the defense but place on the defendant the burden of proving insanity by a preponderance of the evidence. Opponents of the reforms argue that the proposals would be unconstitutional under the due process clause of the United States Constitution.\n\nWhich of the following proposed reforms would be unconstitutional?", "choices": "A)  Both proposals.\n\nB)  Neither proposal.\n\nC)  Proposal A only.\n\nD)  Proposal B only.", "correct": "B", "rule": "Clark v. Arizona: States are NOT constitutionally required to recognize any insanity defense. If a state DOES recognize it, it may shift the burden to the defendant as an affirmative defense.", "takeaway": "No constitutional right to an insanity defense. States can eliminate it entirely (A) or shift the burden to defendant (B). Both constitutional.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1358", "topic": "Criminal Law", "subtopic": "Inchoate Crimes", "question": "A foreign diplomat discovered that a small person could enter a particular jewelry store by crawling through an air vent. The diplomat befriended a woman he met in a bar who he believed was small enough to crawl through the air vent. Without telling her that he was a diplomat, he explained how she could get into the jewelry store. She agreed to help him burglarize the store. Someone overheard their conversation and reported it to the police. Shortly thereafter, the police arrested the diplomat and the woman. Both were charged with conspiracy to commit burglary.\n\nBefore trial, the diplomat moved to dismiss the charge against him on the ground that he was entitled to diplomatic immunity. The court granted his motion. The woman then moved to dismiss the conspiracy charge against her.\n\nThe jurisdiction has adopted the Model Penal Code version of conspiracy.\n\nShould the court grant the woman's motion to dismiss the conspiracy charge against her?", "choices": "A)  No, because the diplomat's defense does not negate any element of the crime.\n\nB)  No, because the woman was not aware of the diplomat's status.\n\nC)  Yes, because a conspiracy requires two guilty participants.\n\nD)  Yes, because but for the diplomat's conduct, no conspiracy would have occurred.", "correct": "A", "rule": "MPC § 5.03 — Unilateral conspiracy: only ONE party needs genuine criminal intent. A defendant can be convicted even if the co-conspirator is acquitted, immune, or has a personal defense.", "takeaway": "MPC = unilateral conspiracy. Co-conspirator's personal defense (immunity, incapacity) is IRRELEVANT to your guilt. Answer C is the common law bilateral rule — not MPC.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1569", "topic": "Criminal Law", "subtopic": "Other Crimes", "question": "A woman went to an art gallery and falsely represented that she was an agent for a museum and wanted to purchase a painting hanging in the gallery. The woman and the gallery owner agreed on a price to be paid 10 days later, and the woman took the painting. When the gallery failed to receive payment, the owner called the museum and discovered that the woman did not work there. The owner then notified the police.\n\nWhen interviewed by the police, the woman admitted making the false representation and acquiring the painting, but she said she believed that the painting had been stolen from her by someone who worked in the gallery.\n\nIs the woman guilty of obtaining property by false pretenses?", "choices": "A)  No, because she believed that the painting belonged to her.\n\nB)  No, because the gallery owner would have sold the painting to anyone who agreed to pay the price.\n\nC)  Yes, because even if her representation was not material, she never intended to pay for the painting.\n\nD)  Yes, because she knowingly made a false representation on which the gallery owner relied.", "correct": "A", "rule": "False pretenses: (1) obtaining title, (2) by intentional false representation, (3) of past/existing fact, (4) with INTENT TO DEFRAUD. Specific intent crime — ANY mistake of fact (even unreasonable) negates intent to defraud.", "takeaway": "False pretenses = specific intent. Subjective belief the property was hers negates intent to defraud — even if unreasonable. No mens rea = no crime.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "847", "topic": "Torts", "subtopic": "Intentional Torts", "question": "The plaintiff, a jockey, was seriously injured in a race when another jockey, the defendant, cut too sharply in front of her without adequate clearance. The two horses collided, causing the plaintiff to fall to the ground, sustaining injury. The State Racetrack Commission ruled that, by cutting in too sharply, the defendant committed a foul in violation of racetrack rules requiring adequate clearance for crossing lanes. The plaintiff has brought an action against the defendant for damages in which one count is based on battery.\n\nWill the plaintiff prevail on the battery claim?", "choices": "A)  Yes, if the defendant was reckless in cutting across in front of the plaintiff's horse.\n\nB)  Yes, because the State Racetrack Commission determined that the defendant committed a foul in violation of rules applicable to racing.\n\nC)  No, unless the defendant intended to cause impermissible contact between the two horses or apprehension of such contact by the plaintiff.\n\nD)  No, because the plaintiff assumed the risk of accidental injury inherent in riding as a jockey in a horse race.", "correct": "C", "rule": "Battery intent: must intend (1) harmful/offensive contact, OR (2) apprehension of such contact (assault intent transfers). Recklessness is NEVER sufficient. Rule violations = evidence of intent, not conclusive. Assumption of risk is NOT a defense to intentional torts.", "takeaway": "Battery requires INTENT — recklessness not enough. Assumption of risk only applies to negligence/strict liability, never intentional torts.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "932", "topic": "Torts", "subtopic": "Negligence", "question": "A defendant has a small trampoline in his backyard which, as he knows, is commonly used by neighbor children as well as his own. The trampoline is in good condition, not defective, and normally surrounded by mats to prevent injury if a user falls off. Prior to leaving with his family for the day, the defendant leaned the trampoline up against the side of the house and placed the mats in the garage.\n\nWhile the defendant and his family were away, the plaintiff, aged 11 and new to the neighborhood, wandered into the defendant's yard and saw the trampoline. The plaintiff had not previously been aware of its presence, but having frequently used a trampoline before, he decided to set it up and started to jump. He lost his balance and took a hard fall on the bare ground, suffering a serious injury that would have been prevented by the mats.\n\nThis jurisdiction has replaced contributory negligence with a pure comparative negligence rule.\n\nIn his action against the defendant, will the plaintiff prevail?", "choices": "A)  No, because children likely to be attracted by the trampoline would normally realize the risk of using it without mats.\n\nB)  No, because the plaintiff failed to exercise reasonable care commensurate with his age, intelligence, and experience.\n\nC)  No, because the plaintiff entered the defendant's yard and used the trampoline without the defendant's permission.\n\nD)  No, because the plaintiff did not know about the trampoline before entering the defendant's yard and thus was not 'lured' onto the premises.", "correct": "A", "rule": "Attractive nuisance (Restatement §339): owner liable if (i) children likely to trespass, (ii) unreasonable risk, (iii) children would NOT appreciate risk due to youth, (iv) burden of eliminating danger is slight. Element (iii) fails — experienced 11-yr-old likely knows mats are needed.", "takeaway": "Key element: child must NOT appreciate the risk. Experienced 11-yr-old likely does appreciate need for mats → element (iii) fails → no liability.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1532", "topic": "Torts", "subtopic": "Negligence", "question": "A man and his friend, who were both adults, went to a party. The man and the friend had many drinks at the party and became legally intoxicated. They decided to play a game of chance called 'Russian roulette' using a gun loaded with one bullet. As part of the game, the man pointed the gun at the friend and, on her command, pulled the trigger. The man shot the friend in the shoulder.\n\nThe friend has brought a negligence action against the man. Traditional defenses based on plaintiff's conduct apply.\n\nWhat is likely to be the dispositive issue in this case?", "choices": "A)  Whether the game constituted a joint venture.\n\nB)  Whether the friend could validly consent to the game.\n\nC)  Whether the friend was also negligent.\n\nD)  Whether the man was legally intoxicated when he began playing the game.", "correct": "C", "rule": "'Traditional defenses based on plaintiff's conduct' = contributory negligence. Plaintiff's own negligence completely bars recovery. Consent = defense to intentional torts, not negligence. Intoxication does NOT lower the objective standard of care.", "takeaway": "'Traditional defenses based on plaintiff's conduct' signals contributory negligence. Friend voluntarily played Russian roulette = also negligent = complete bar to recovery.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1506", "topic": "Torts", "subtopic": "Other Torts", "question": "An assistant to a famous writer surreptitiously observed the writer as the writer typed her private password into her personal computer in order to access her email. On several subsequent occasions in the writer's absence, the assistant read the writer's email messages and printed out selections from them.\n\nThe assistant later quit his job and earned a considerable amount of money by leaking information to the media that he had learned from reading the writer's email messages. All of the information published about the writer as a result of the assistant's conduct was true and concerned matters of public interest.\n\nThe writer's secretary had seen the assistant reading the writer's emails and printing out selections, and she has told the writer what she saw. The writer now wishes to sue the assistant for damages.\n\nCan the writer recover damages from the assistant?", "choices": "A)  No, because the assistant was an invitee on the premises.\n\nB)  No, because the published information resulting from the assistant's conduct was true and concerned matters of public interest.\n\nC)  Yes, because the assistant invaded the writer's privacy.\n\nD)  Yes, because the published information resulting from the assistant's conduct constituted publication of private facts concerning the writer.", "correct": "C", "rule": "4 invasion of privacy torts: appropriation, intrusion upon seclusion, false light, public disclosure. Intrusion upon seclusion: truth is NOT a defense; publication is IRRELEVANT — the unauthorized ACCESS is the wrong.", "takeaway": "Truth = defense to defamation. Truth = NO defense to invasion of privacy. The wrongful prying is the tort, regardless of what happens afterward.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "710", "topic": "Torts", "subtopic": "Strict Liability / Products Liability", "question": "A company operates an aircraft maintenance and repair business serving owners of private airplanes. A pilot contracted with the company to replace the engine in his plane with a more powerful engine of foreign manufacture. The company purchased the replacement engine through a representative of the manufacturer and installed it. A short time after it was put into use, the new engine failed, and the plane crashed into a warehouse, destroying the warehouse and its contents. The company was guilty of no negligence in the procurement, inspection, or installation of the engine. The failure was caused by a defect not disclosable by available inspection procedures. There was no negligence on the part of the pilot, who escaped the disabled plane by parachute.\n\nThe warehouse owner recovered a judgment for damages from the pilot. The pilot has asserted a claim against the company to recover compensation on account of that liability.\n\nIn that action, the pilot will recover:", "choices": "A)  full compensation, because the engine was defective.\n\nB)  no compensation, because the company was not negligent.\n\nC)  contribution only, because the company and the pilot were equally innocent.\n\nD)  no compensation, because the warehouse owner's judgment established the pilot's responsibility to the warehouse owner.", "correct": "A", "rule": "Strict products liability: commercial supplier liable regardless of negligence if product is defective. Each supplier in the chain is fully liable and can seek indemnification upstream.", "takeaway": "Strict liability = no negligence required. Company is a commercial supplier of a defective engine → fully liable. Pilot recovers 100%. Company then seeks indemnification from manufacturer.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1339", "topic": "Contracts", "subtopic": "Formation of Contracts", "question": "On June 1, a seller received a mail order requesting prompt shipment of a specified computer model at the seller's catalog price. On June 2, the seller mailed an acceptance letter and assured the buyer the computer would ship on June 3. On June 3, realizing he was out of that model, the seller shipped a different computer model and mailed a separate notice of accommodation. On June 5, the buyer received the June 2 acceptance letter and the different computer, but not the notice of accommodation.\n\nOn June 5, which is a correct statement of the parties' legal rights and duties?", "choices": "A)  The buyer can either accept or reject the different computer model and, in either event, recover damages, if any, for breach of contract.\n\nB)  The buyer can either accept or reject the different computer model, but if he rejects it, he will thereby waive any remedy for breach of contract.\n\nC)  The seller's prompt shipment of nonconforming goods constituted an acceptance of the buyer's offer, thereby creating a contract for the sale of the different computer model.\n\nD)  The seller's notice of accommodation was timely mailed, and his shipment of the different computer model constituted a counteroffer.", "correct": "A", "rule": "UCC § 2-206(1)(b): An offer to buy goods for prompt shipment is accepted by either prompt shipment of conforming OR non-conforming goods, OR a promise to ship. When a seller sends an affirmative acceptance AND then ships non-conforming goods, the shipment is a breach of the accepted contract — not a counteroffer. The accommodation notice is irrelevant once a written acceptance already exists.", "takeaway": "Key distinction: if seller ships non-conforming goods WITHOUT a prior acceptance, it's a counteroffer (accommodation). But if seller already sent a written acceptance, the non-conforming shipment = BREACH. Buyer can accept or reject and sue either way.", "notes": "", "status": "Reviewed", "mastered": "No"}, {"num": "702", "topic": "Contracts", "subtopic": "Remedies", "question": "A painter contracted to paint an owner's office for $1,000 over the following weekend to avoid disrupting business. The painter commenced work on Saturday and finished half the painting by day's end. That night, without fault of either party, the office building was destroyed by fire.\n\nWhich of the following is an accurate statement?", "choices": "A)  Both parties' contractual duties are discharged, and the painter can recover nothing from the owner.\n\nB)  Both parties' contractual duties are discharged, but the painter can recover in quasi-contract from the owner.\n\nC)  Only the painter's contractual duty is discharged, because the owner's performance (payment) is not impossible.\n\nD)  Only the painter's contractual duty is discharged, and the painter can recover his reliance damages from the owner.", "correct": "B", "rule": "When a specific thing necessary for performance is destroyed (supervening impossibility), both parties' contractual duties are discharged. However, any benefit already conferred before the supervening event is recoverable in restitution/quasi-contract. Reliance damages are NOT recoverable when discharge is by impossibility — only restitution is available.", "takeaway": "Fire destroys subject matter → both parties discharged. But partial performance already rendered = recoverable in quasi-contract/restitution. Reliance damages don't apply when impossibility is the reason for discharge.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1231", "topic": "Contracts", "subtopic": "Remedies", "question": "A buyer contracted to purchase 1,000 sets of specially manufactured nonstandard ball bearings for $10/set. The seller calculated it would cost $8/set to manufacture. Delivery was in 60 days. 55 days later, after completing production, the buyer repudiated. The seller notified the buyer and resold all 1,000 sets to a salvage company for $2/set. The seller sued for damages.\n\nWhat damages should the court award the seller?", "choices": "A)  $2 per set — the difference between cost of manufacture and the contract price.\n\nB)  $6 per set — the difference between cost of manufacture and the salvage price.\n\nC)  $8 per set — lost profits plus unrecovered cost of manufacture.\n\nD)  Nominal damages, because the seller failed to resell the goods by public auction.", "correct": "C", "rule": "UCC § 2-708(2) lost profit formula for sellers: Profit seller would have made ($2/set) + costs reasonably incurred ($8/set) - proceeds from resale ($2/set) = $8/set. This puts the seller in the position it would have been in had the contract been performed. Resale by private sale is fine as long as buyer is notified.", "takeaway": "UCC § 2-708(2): lost profit + incurred costs - resale proceeds. Here: $2 + $8 - $2 = $8/set. The goal is to put the seller in the position performance would have. Don't just use resale price difference.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "990", "topic": "Contracts", "subtopic": "Remedies", "question": "A computer store contracted to sell a specific ICB computer to a customer for $3,000, with pickup and payment on February 1. The customer unjustifiably repudiated on February 1. Without notifying the customer, the store sold the same computer to a different buyer for $3,000. The ICB is a popular product and the store can buy more units from the manufacturer than it can sell at retail.\n\nIf the store sues the customer for breach, the store will probably recover:", "choices": "A)  Nothing, because it received a price on resale equal to the contract price.\n\nB)  Nothing, because the store failed to give the customer proper notice of resale.\n\nC)  The store's anticipated profit on the sale to the customer plus incidental damages, because the store lost that sale.\n\nD)  $3,000 (the contract price), because the customer intentionally breached.", "correct": "C", "rule": "UCC lost volume seller doctrine: when a seller can supply more units than it can sell and resells to a different buyer, the resale doesn't mitigate damages — the seller lost a sale it would have otherwise made. Failure to give resale notice forecloses the resale price formula but does NOT eliminate recovery of lost profits. Lost volume seller recovers expected profit + incidental damages.", "takeaway": "Lost volume seller = can get more inventory than it can sell. The resale to Buyer 2 didn't replace the lost sale — it was an ADDITIONAL sale the store would have made anyway. Recover lost profit even if resale price = contract price.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1026", "topic": "Evidence", "subtopic": "Hearsay", "question": "A plaintiff sued a defendant for shooting her husband from ambush. The plaintiff offers to testify that, the day before her husband was killed, he described to her a chance meeting with the defendant on the street in which the defendant said, 'I'm going to blow your head off one of these days.'\n\nThe plaintiff's testimony concerning her husband's statement is:", "choices": "A)  Admissible, to show the defendant's state of mind.\n\nB)  Admissible, because the defendant's statement is that of a party-opponent.\n\nC)  Inadmissible, because it is improper evidence of a prior bad act.\n\nD)  Inadmissible, because it is hearsay not within any exception.", "correct": "D", "rule": "This is double hearsay (FRE 805): (1) defendant's statement to the husband, and (2) husband's statement to the plaintiff. Each layer must independently satisfy a hearsay exception. The defendant's statement to the husband could be a party-admission (non-hearsay), but the husband's statement to the plaintiff is hearsay with no applicable exception — it is being offered for the truth of the matter asserted (that the defendant made the threat).", "takeaway": "Double hearsay: each layer needs its own exception. The inner statement (defendant → husband) might be a party-admission, but the outer layer (husband → plaintiff) has no exception. The whole thing fails because you can't cure the outer hearsay.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "957", "topic": "Evidence", "subtopic": "Hearsay", "question": "A defendant is on trial for evading $100,000 in taxes. The prosecution offers an anonymous letter to the IRS, identified as being in the defendant's handwriting, saying: 'I promised my mother on her deathbed I would try to pay my back taxes. Here is $10,000. I'll make other payments if you promise not to prosecute. Answer yes by personal ad saying, OK on tax deal.'\n\nThe letter is:", "choices": "A)  Admissible, as a statement of present intention or plan.\n\nB)  Admissible, as an admission of a party-opponent.\n\nC)  Inadmissible, because it is an effort to settle a claim.\n\nD)  Inadmissible, because the probative value is substantially outweighed by the risk of unfair prejudice.", "correct": "B", "rule": "FRE 801(d)(2): A statement by an opposing party offered against that party is not hearsay (party-opponent admission). The letter is in the defendant's handwriting, offered by the prosecution against the defendant — classic party admission. Settlement exclusion (FRE 408) doesn't apply because the defendant admitted liability and amount; the offer to settle rather than litigate doesn't make it a disputed-claim settlement.", "takeaway": "Party-opponent admissions (FRE 801(d)(2)) are not hearsay. Settlement rule (FRE 408) only applies when liability or amount is DISPUTED. Here defendant admitted both → letter is admissible as a party admission, not excluded as settlement offer.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "948", "topic": "Evidence", "subtopic": "Hearsay", "question": "A husband and wife watched thieves break into a jewelry store across the street. The husband read the license plate number to his wife through binoculars as she simultaneously called the police and relayed the number. Neither has present memory of the number. The prosecutor offers a properly authenticated police tape recording of the wife's call giving the license number, independently shown to belong to the defendant's car.\n\nThe tape recording of the wife stating the license number is:", "choices": "A)  Admissible, under the hearsay exception for present sense impressions.\n\nB)  Admissible, as nonhearsay circumstantial evidence.\n\nC)  Inadmissible, because it is hearsay not within any exception.\n\nD)  Inadmissible, because the wife never had firsthand knowledge of the license number.", "correct": "A", "rule": "FRE 803(1) Present Sense Impression: a statement describing an event made while or immediately after perceiving it. This is double hearsay — husband's statement to wife AND wife's statement to police — but BOTH satisfy present sense impression: husband stated the plate as he saw it, and wife relayed it simultaneously while perceiving it. Wife does not need independent firsthand knowledge; she heard the husband's real-time statement.", "takeaway": "Present sense impression covers relay statements made in real-time. Husband read plate as he saw it (PSI #1); wife relayed it instantly to police (PSI #2). Both layers covered. Wife doesn't need her own firsthand knowledge of the plate.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "729", "topic": "Evidence", "subtopic": "Hearsay", "question": "A man and his friend were tried separately for burglary. At the man's trial, the friend testified he saw the man commit the burglary. While the friend is still subject to recall, the man calls the friend's cellmate to testify that the friend said, 'I broke into the warehouse alone because [the man] was too drunk to help.'\n\nThe evidence of the friend's statement is:", "choices": "A)  Admissible, as a declaration against penal interest.\n\nB)  Admissible, as a prior inconsistent statement.\n\nC)  Inadmissible, because it is hearsay not within any exception.\n\nD)  Inadmissible, because the statement is not clearly corroborated.", "correct": "B", "rule": "FRE 613: Prior inconsistent statements can be used to impeach a witness via extrinsic evidence as long as the witness is given a chance to explain or deny, and the adverse party can examine the witness. The friend is still subject to recall, so both requirements are met. Note: this is admissible for IMPEACHMENT only (not substantive evidence) because it was not made under oath. Statement against penal interest (FRE 804(b)(3)) requires declarant to be unavailable — friend is available.", "takeaway": "Prior inconsistent statement = admissible for impeachment (not substance) when witness is available and can be recalled to explain. Statement against penal interest requires unavailability — doesn't apply when declarant is still on the stand. No corroboration required for impeachment use.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "679", "topic": "Evidence", "subtopic": "Relevancy and Excluding Relevant Evidence", "question": "At a defendant's theft trial, the defendant called a character witness who testified that the defendant had an excellent reputation for honesty. In rebuttal, the prosecutor calls a witness to testify that he recently saw the defendant cheat on a college examination.\n\nThe prosecution witness's testimony should be:", "choices": "A)  Admitted, because the defendant has 'opened the door' to the prosecutor's proof of bad character evidence.\n\nB)  Admitted, because the cheating involves 'dishonesty or false statement.'\n\nC)  Excluded, because it has no probative value on any issue in the case.\n\nD)  Excluded, because the defendant's cheating can be inquired into only on cross-examination of the defendant's witness.", "correct": "D", "rule": "FRE 405(a) & 608(b): When a defendant puts character in issue through a reputation/opinion witness, the prosecution may rebut by (1) calling its own character witness, or (2) cross-examining the defendant's character witness about specific instances of misconduct. Specific acts of misconduct may NOT be proven through extrinsic evidence (a separate rebuttal witness) — only through cross-examination of the character witness.", "takeaway": "Opening the door to character = prosecution can rebut, but ONLY via cross-examination of the character witness about specific acts. Prosecution CANNOT call a separate witness to prove specific misconduct extrinsically. FRE 608(b): specific acts = cross only, never extrinsic.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1301", "topic": "Evidence", "subtopic": "Relevancy and Excluding Relevant Evidence", "question": "In a will dispute over $1 million, the issue is whether a wife survived her husband when both died in a small plane crash. A statute creates a rebuttable presumption that neither spouse survived the other in a common disaster. A witness testifies that as she approached the plane she heard what she thought was a woman's voice saying, 'I'm dying,' though both spouses were dead by the time they were removed.\n\nIs the witness's testimony admissible?", "choices": "A)  No, because the matter is governed by the presumption that neither spouse survived the other.\n\nB)  No, because the witness's testimony is too speculative to support a finding.\n\nC)  Yes, because the hearsay rule does not apply to statements by decedents in actions to determine rights under a will.\n\nD)  Yes, because it is relevant and not otherwise prohibited.", "correct": "D", "rule": "FRE 401: relevant evidence is admissible unless prohibited. The statement is NOT hearsay because it is not offered for its truth ('I am dying') but as circumstantial evidence that the wife was still alive when she spoke. The rebuttable presumption (bursting bubble theory) is destroyed once any contrary evidence is introduced — the testimony is sufficient to rebut it. Lay witness need not be certain; perception + memory satisfies FRE 701.", "takeaway": "'I'm dying' is not hearsay — not offered for truth but as evidence she was alive when she spoke. The rebuttable presumption bursts with any contrary evidence. Lay witness doesn't need certainty, just personal perception. Answer C misstates the reason — it IS admissible, but not because hearsay doesn't apply to decedents.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "599", "topic": "Contracts", "subtopic": "Performance, Breach, and Discharge", "question": "A pastry company agreed to sell its entire output of baked buns to a retailer for one year at a set price. The retailer agreed not to sell any other supplier's baked buns. The contract allowed termination by either party on reasonable notice. After six months, the pastry company dismantled its bun-baker (claiming it was uneconomical) and began making dog biscuits. The retailer sued for breach.\n\nWhich should the court rule?", "choices": "A)  Summary judgment for the retailer — the pastry company cannot discontinue production merely because it was losing money.\n\nB)  Summary judgment for the pastry company — cessation of production amounted to valid notice of termination.\n\nC)  Both motions denied — triable issues of fact exist as to whether the pastry company gave reasonable notice or whether its losses justified cessation of production.\n\nD)  Both motions denied — the pastry company may cease production but must share dog biscuit profits with the retailer until year end.", "correct": "C", "rule": "UCC output contracts: seller must deliver actual output as occurs in good faith (UCC § 2-306). A seller may reduce or cease output only if done in good faith — not to escape contractual obligations. Whether cessation was in good faith and whether reasonable notice was given are QUESTIONS OF FACT not suitable for summary judgment.", "takeaway": "Output contracts require good faith — seller can reduce/stop production only if genuinely necessary, not to avoid the contract. Good faith and reasonable notice are fact questions → both summary judgment motions fail.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "633", "topic": "Contracts", "subtopic": "Third-Party Rights", "question": "An expert contracted to lift and emplace air-conditioning equipment atop a builder's building. The contract included: (1) an exculpatory clause making the builder (not the expert) liable for any physical damage during installation; (2) a liquidated damages clause for late completion; (3) a 'time is of the essence' clause; and (4) a clause requiring extra work modifications to be in a signed writing. The expert notified the builder he was selling his business to someone equally skilled who would 'take over' the contract. The builder refuses to accept the substitute.\n\nWhich clause best supports the builder's argument that the expert's duties were not delegable without consent?", "choices": "A)  The exculpatory clause.\n\nB)  The liquidated-damage clause.\n\nC)  The 'time is of the essence' clause.\n\nD)  The extra-work clause.", "correct": "A", "rule": "Delegation rule: duties are generally delegable unless (1) the obligee has a substantial interest in having the original promisor perform, (2) the contract involves special skills, (3) there is special trust between parties, or (4) there is a contractual anti-delegation clause. The exculpatory clause puts damage liability on the BUILDER — creating a substantial interest in who performs. A less-skilled substitute could cause more damage, increasing the builder's exposure.", "takeaway": "The exculpatory clause makes the builder bear damage liability → builder has a substantial interest in who performs → duty is non-delegable. Liquidated damages and time-of-essence clauses don't create a substantial interest in the identity of the performer.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1300", "topic": "Evidence", "subtopic": "Hearsay", "question": "A plaintiff sued her employer for poor working conditions that caused a stomach ulcer. At trial, her medical expert testified about the cause of the ulcer and said his opinion was based in part on a letter the plaintiff's personal doctor had written to the employer explaining why the plaintiff had missed work.\n\nWhen offered to prove the cause of the plaintiff's condition, is the letter from the plaintiff's doctor admissible?", "choices": "A)  No, because it is hearsay not within any exception.\n\nB)  No, because the plaintiff's doctor is not shown to be unavailable.\n\nC)  Yes, because it was relied upon by the plaintiff's medical expert.\n\nD)  Yes, under the business records exception to the hearsay rule.", "correct": "A", "rule": "The letter is hearsay offered for its truth (to prove the cause of the condition). It is NOT a business record (FRE 803(6)) because it was written on an ad hoc basis, not in the ordinary course of regularly conducted activity. While experts may rely on hearsay (FRE 703), inadmissible hearsay can only be disclosed to the jury if its probative value in helping evaluate the opinion substantially outweighs prejudicial effect — a strict test not met here.", "takeaway": "A personal doctor's letter written for a specific occasion ≠ business record (not regular course of business). Expert reliance on hearsay doesn't automatically make it admissible to the jury — FRE 703's strict balancing test usually keeps it out. Unavailability of declarant is irrelevant here (that's an FRE 804 concept).", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "BBR-1", "topic": "Evidence", "subtopic": "Hearsay", "question": "A witness who was unable to speak was an eyewitness to a robbery in the park. He went to the police station shortly after the crime was committed, and when asked who committed the robbery, pointed to the defendant in a police lineup in which there were several men dressed like the defendant. The defendant was then indicted for robbery. The witness died before trial, and the sergeant in charge of the lineup desires to testify at the defendant's trial that the witness pointed to the defendant at the lineup.\n\nIs his testimony admissible?", "choices": "A)  Yes, as evidence of prior identification.\n\nB)  Yes, to prove the defendant committed the crime.\n\nC)  No, because the sergeant's testimony is hearsay.\n\nD)  No, because the defendant's counsel was not present at the lineup.", "correct": "C", "rule": "FRE 801(a): a 'statement' includes nonverbal conduct intended as an assertion. The witness's pointing was an assertive act = a statement. FRE 801(d)(1)(C): prior identification is nonhearsay ONLY if the declarant testifies at trial and is subject to cross-examination. Here, the witness is dead and cannot testify → the prior ID exception does not apply → the sergeant's testimony is inadmissible hearsay.", "takeaway": "Prior identification (FRE 801(d)(1)(C)) is only nonhearsay if the identifying witness is ON THE STAND and subject to cross-examination. Dead witness = no exception. The pointing = assertive conduct = a hearsay statement.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "BBR-23", "topic": "Civil Procedure", "subtopic": "Venue", "question": "The plaintiff, who resides in the Southern District of State A, was involved in a three-car accident in the Northern District of State A. The plaintiff intends to file a negligence action against the other two drivers in federal district court. One defendant resides in the District of State B and the other resides in the District of State C.\n\nIn which federal district(s) is venue proper?", "choices": "A)  The Northern District of State A only.\n\nB)  The District of State B and the District of State C.\n\nC)  The Northern District of State A, the District of State B, and the District of State C.\n\nD)  The Northern District of State A, the Southern District of State A, the District of State B, and the District of State C.", "correct": "A", "rule": "28 U.S.C. § 1391: Venue is proper in (i) any district where any defendant resides, IF all defendants reside in the same state; or (ii) any district where a substantial part of the events or omissions giving rise to the claim occurred. Here: defendants reside in DIFFERENT states → prong (i) unavailable. The accident occurred in the Northern District of State A → prong (ii) applies → only proper venue. Plaintiff's residence is irrelevant to venue.", "takeaway": "All-defendants-same-state test: if defendants live in different states, you CANNOT use defendant residence for venue. Fall back to where the events occurred. Plaintiff's residence never counts for venue purposes.", "notes": "If there are defendants from different states, the only venue that could work is where the substantial events occurred ( note: formation of contract and breaching of contract are both substantial events) ", "status": "More Practice Needed", "mastered": "No"}, {"num": "BBR-25", "topic": "Criminal Law", "subtopic": "Inchoate Crimes", "question": "The neighbors to the north and south of a poorly maintained house — a mechanic and a doctor — decided to 'send a message' by placing a smoke bomb on the owner's front porch. They consulted an army veteran known to be an explosives expert, who agreed to help. Unbeknownst to the neighbors, the veteran manufactured a bomb with a lethal quantity of explosives because he wanted to make sure the owner had a good scare. The mechanic set the bomb on the owner's porch. A huge explosion blew away the front of the owner's house. Nobody was injured.\n\nWho, of the following, is likely to be found guilty of attempted murder?", "choices": "A)  The doctor, mechanic, and the army veteran.\n\nB)  The army veteran and the mechanic, but not the doctor.\n\nC)  The army veteran, but not the doctor or the mechanic.\n\nD)  Neither the mechanic nor the doctor nor the army veteran.", "correct": "D", "rule": "Attempted murder at common law requires SPECIFIC INTENT TO KILL. The mechanic and doctor only intended to scare the owner (smoke bomb). The army veteran wanted to scare, not kill — his use of lethal explosives showed recklessness/depraved heart, but since no one died, he cannot be charged with completed murder, and attempted murder requires specific intent to kill. Recklessness or depraved heart ≠ specific intent for attempt.", "takeaway": "Attempt = specific intent to bring about the criminal result. Depraved heart recklessness can support murder if someone dies, but NOT attempted murder. Nobody here had specific intent to kill → no one guilty of attempted murder.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "BBR-45", "topic": "Criminal Law", "subtopic": "Confessions", "question": "A burglar awaiting trial on burglary charges asked a jail officer to let him speak with a highway patrol officer. When the patrol officer came to the cell, the burglar spontaneously told him that he had been the driver of a truck that struck and killed a couple, and had been speeding away from a burglary at the time. The burglar was charged with felony murder. At trial, the prosecution seeks to introduce the burglar's statements to the patrol officer.\n\nWhich of the following is the strongest argument for permitting the statements into evidence?", "choices": "A)  The burglar had not been charged in connection with the auto accident at the time the statements were made.\n\nB)  The burglar made the statements spontaneously, without inducement or interrogation by the police.\n\nC)  The highway patrol officer had no connection with the burglary investigation for which the burglar had been incarcerated.\n\nD)  The burglar's statements were not the product of coercion by the police officers.", "correct": "B", "rule": "Miranda v. Arizona: Miranda warnings are required only when a suspect is (1) in custody AND (2) subject to interrogation. Custody is met (burglar is in jail). But if the statement is SPONTANEOUS — not the product of any interrogation — Miranda does not apply. The burglar initiated the contact and volunteered the information without any police questioning. Spontaneous statements are admissible. (A) is wrong because being uncharged doesn't eliminate Miranda custody; (C) is wrong because the officer's identity doesn't change Miranda analysis; (D) is wrong because Miranda goes beyond voluntariness.", "takeaway": "Miranda applies to custodial INTERROGATION. No interrogation = no Miranda issue. A spontaneous, unprompted confession volunteered by the defendant is always admissible — even in custody — because it is not the product of interrogation.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "BBR-53", "topic": "Torts", "subtopic": "Products Liability", "question": "A consumer purchased an air compressor designed for powering tools and inflating tires. He discovered that a spray gun he owned fit the threads on the compressor's nozzle, so he used his compressor instead of buying the compressor that went with the spray gun. After painting for a few minutes, the paint reservoir on the spray gun exploded, severely injuring the consumer. Evidence revealed: (i) the compressor developed too much air pressure for spray devices — which is why the manufacturer never made a spray painting attachment; (ii) the manufacturer used unusual threading to prevent use with most spray systems, but the spray gun happened to use the same threading; and (iii) the compressor was completely safe and defect-free when used with its intended tools.\n\nIf the jury finds for the manufacturer, what is the most likely explanation?", "choices": "A)  The manufacturer exercised due care in the design and manufacture of the paint sprayer.\n\nB)  It was not foreseeable that the compressor would be used by consumers to attach power spray devices.\n\nC)  The compressor suffered from no design or manufacturing defects when used in the intended manner.\n\nD)  The consumer misused the compressor when he attached it to his spray-painting gun.", "correct": "B", "rule": "Strict products liability: a manufacturer is liable even for plaintiff's misuse of a product IF that misuse was foreseeable. The manufacturer deliberately chose unusual threading to PREVENT connection to spray systems, meaning they anticipated and tried to guard against exactly this use. However, if the jury finds the misuse was NOT foreseeable (the coincidental same-threading was not something they could have anticipated), the manufacturer prevails. Foreseeability of misuse is a jury question.", "takeaway": "Strict liability + product misuse: manufacturer is liable if misuse was foreseeable. The key jury question here is foreseeability. The manufacturer tried to prevent this misuse via unusual threading — but whether that specific threading coincidence was foreseeable is for the jury. (A) is wrong because due care is irrelevant under strict liability.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "BBR-54", "topic": "Contracts", "subtopic": "Formation of Contracts", "question": "On August 1, a realtor mailed a written offer to a developer for the sale of a large tract of land, stating: 'This offer expires on September 1, if the offeree has not caused an acceptance to be received by the offeror on or before that date.' Early on September 1, the developer sent a written acceptance by messenger, but the messenger company negligently withheld delivery until September 2. On September 4, the realtor entered into a contract for sale of the tract to another buyer without informing the developer. When the developer contacted the realtor a few days later, the realtor said there was no contract between them.\n\nWhat is the most accurate statement regarding the relationship between the parties?", "choices": "A)  No contract between the realtor and the developer arose on September 2.\n\nB)  A contract would have arisen if a letter of acceptance were mailed on September 1.\n\nC)  The realtor's silence constituted an acceptance of the developer's written message on September 2.\n\nD)  A voidable contract arose on September 1.", "correct": "A", "rule": "The mailbox rule (acceptance effective upon dispatch) does NOT apply when the offer specifies that acceptance must be RECEIVED by the offeror. Here the offer stated acceptance must be 'received' by September 1. The developer's acceptance was not received until September 2 — after the deadline. The late delivery by the messenger does not excuse the failure to meet the condition. No contract formed.", "takeaway": "Mailbox rule is the DEFAULT. But an offeror can contract around it by requiring RECEIPT of acceptance. When the offer says 'acceptance must be received by [date],' the mailbox rule does not apply — acceptance is only effective when actually received. Late receipt = no contract.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "BBR-56", "topic": "Real Property", "subtopic": "Co-Tenancy", "question": "A property owner conveyed a tract of commercial property in joint tenancy to his twin sons as a birthday present. The owner and his sons later had a falling out. The owner demanded the sons return the deed, which they did, and the owner destroyed it. A few months later, one of the twins learned he was seriously ill and executed a quitclaim deed conveying 'any interest I have in the commercial property conveyed to me and my brother from my father' to his daughter. The twin who conveyed the property subsequently died.\n\nWho owns the property?", "choices": "A)  The living twin.\n\nB)  The property owner.\n\nC)  The living twin and the deceased twin's daughter as tenants in common.\n\nD)  The living twin and the deceased twin's daughter as joint tenants.", "correct": "C", "rule": "Joint tenancy: when one joint tenant conveys their interest to a third party, the joint tenancy is SEVERED as to that share, which is then held as a tenancy in common. The ill twin's quitclaim deed to his daughter severed the joint tenancy — his share became a tenancy in common interest. The right of survivorship no longer applies to that share. Returning the deed did NOT reconvey property back to the grantor (a reconveyance requires a new deed).", "takeaway": "Any conveyance by a joint tenant severs the joint tenancy as to that share → tenancy in common. Right of survivorship eliminated for the conveyed share. Returning a deed does NOT undo a prior conveyance — you need a new reconveyance deed.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "BBR-59", "topic": "Criminal Law", "subtopic": "Elements of Crime", "question": "A man and his friend were walking across a bridge on their way home from watching a wrestling event and began playfully reenacting wrestling moves. As part of one move, the man lightly shoved his friend. The friend exaggeratedly stumbled backward into the bridge's railing. Unbeknownst to either of them, the railing was weak and in need of replacement, and the friend fell through and into the water below. The friend died as a result of the fall.\n\nIn a jurisdiction that follows common law, what is the most serious crime, if any, with which the man can be charged?", "choices": "A)  No crime.\n\nB)  Murder.\n\nC)  Voluntary manslaughter.\n\nD)  Involuntary manslaughter.", "correct": "A", "rule": "Common law murder requires malice aforethought: (1) intent to kill, (2) intent to inflict serious bodily harm, (3) depraved heart recklessness, or (4) felony murder. Involuntary manslaughter = criminal negligence or unlawful act. Here, the man lightly shoved his friend as part of a consensual play-wrestling — this is an ordinary, low-risk action. The friend's exaggerated stumble and the unknown defective railing broke the causal chain. The man had no criminal intent and was not acting with criminal negligence. No crime.", "takeaway": "A light shove during consensual play is not criminally negligent, reckless, or intentional as to bodily harm. The unforeseeable defective railing and exaggerated stumble are superseding causes. Without at least criminal negligence, there is no homicide crime.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "BBR-64", "topic": "Real Property", "subtopic": "Landlord-Tenant", "question": "A landlord entered into a written five-year lease with a perfumery for $1,000/month. After two years and three months, with the landlord's oral permission, the perfumery transferred its entire remaining interest in the lease to a dry cleaner in writing. The dry cleaner paid rent for 14 months, then sought and received the landlord's oral assent to transfer its interest to a jewelry store. The jewelry store paid rent for three months, then stopped. The landlord cannot find a new tenant.\n\nWhom can the landlord proceed against to collect the unpaid rent?", "choices": "A)  Either the jewelry store or the perfumery.\n\nB)  The jewelry store only.\n\nC)  The perfumery only.\n\nD)  The jewelry store or the dry cleaner.", "correct": "A", "rule": "Assignment: a complete transfer of remaining lease term. Assignee is in privity of ESTATE with landlord → liable for rent while in possession. Original tenant retains privity of CONTRACT with landlord → remains liable throughout the lease. Dry cleaner assigned to jewelry store, ending dry cleaner's privity of estate. Perfumery never left privity of contract. Jewelry store is current assignee in privity of estate.", "takeaway": "Privity of estate = current possessor (jewelry store). Privity of contract = original tenant (perfumery). BOTH are liable to the landlord. Dry cleaner cut off liability when it assigned away. The landlord can pursue either the jewelry store (privity of estate) or the perfumery (privity of contract).", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "BBR-66", "topic": "Contracts", "subtopic": "Consideration", "question": "A gardener contracted with a landowner to provide monthly gardening services for the calendar year at $200/month. On June 1, the gardener told the landowner she could no longer afford to work for $200/month and demanded $400/month. The landowner refused. The gardener again insisted she would not work for less than $400. As a result, the gardener and landowner agreed in writing on July 1 that the gardener would thereafter be paid $400/month and that the term of the agreement would be extended through the end of next year.\n\nIs the gardener legally entitled to receive $400/month after July 1?", "choices": "A)  Yes, but only for the period from January 1 to December 31 of next year.\n\nB)  Yes, because the gardener and the landowner mutually agreed to modify their original contract.\n\nC)  No, because the gardener used economic duress to obtain the landowner's agreement to the modification.\n\nD)  No, because the gardener was under a preexisting duty to perform the gardening services for $200 a month.", "correct": "B", "rule": "Common law contract modification requires consideration. Pre-existing duty rule: a promise to do what you're already legally obligated to do is not valid consideration. BUT here, the modification was supported by NEW consideration: the gardener agreed to extend the contract term through the end of next year (additional work beyond the original contract). The extension = fresh consideration that supports the price increase. Economic duress requires showing the other party had no meaningful choice — not present here.", "takeaway": "Pre-existing duty rule bars modifications without new consideration. But here the gardener gave new consideration: an extended term. Extension of the contract = new consideration = valid modification. Economic duress requires no meaningful alternative — not shown here. Answer D would be correct if no new consideration existed.", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1571", "topic": "Contracts", "subtopic": "Remedies", "question": "An art collector paid a gallery $1,000 to purchase a framed drawing from the gallery's collection. The price includedshipping by the gallery to the collector's home. The gallery's owner used inadequate materials to wrap the drawing.The frame broke during shipment and scratched the drawing, reducing the drawing's value to $300. The collectorcomplained to the gallery owner, who told the collector to take the drawing to a specific art restorer to have thedrawing repaired. The collector paid the restorer $400 to repair the drawing, but not all of the scratches could be fixed.The drawing, after being repaired, was worth $700. The gallery owner subsequently refused to pay either for therepairs or for the damage to the drawing.In an action by the collector against the gallery owner for damages, which of the following awards is most likely?", "choices": "A)  The correct answer is DQuestionAn art collector paid a gallery $1,000 to purchase a framed drawing from the gallery's collection. The price includedshipping by the gallery to the collector's home. The gallery's owner used inadequate materials to wrap the drawing.The frame broke during shipment and scratched the drawing, reducing the drawing's value to $300. The collectorcomplained to the gallery owner, who told the collector to take the drawing to a specific art restorer to have thedrawing repaired. The collector paid the restorer $400 to repair the drawing, but not all of the scratches could be fixed.The drawing, after being repaired, was worth $700. The gallery owner subsequently refused to pay either for therepairs or for the damage to the drawing.In an action by the collector against the gallery owner for damages, which of the following awards is most likely?\n\nB)  $300.\n\nC)  $400.\n\nD)  $700.", "correct": "D", "rule": "D is correct. The gallery's use of inadequate materials to wrap the drawing constituted a breach of warranty.Therefore, the collector is entitled to be placed in the position he would have been in but for the gallery's breach.Under UCC § 2-714(2), the generally applicable standard for measuring the collector's resulting damages would bethe difference between the value of the drawing as accepted and the value of the drawing if it had been as warranted.Repair costs often are used to determine this", "takeaway": "The gallery's use of inadequate materials to wrap the drawing constituted a breach of warranty.Therefore, the collector is entitled to be placed in the position he would have been in but for the gallery's breach.Under UCC § 2-714(2), the generally applicable standard for measuring the collector's resulting damages would bethe difference between the", "notes": "", "status": "Not Started", "mastered": "No"}, {"num": "1031", "topic": "Contracts", "subtopic": "Performance, Breach, and Discharge", "question": "A tenant rented a commercial building from a landlord and operated a business in it. The building's large front windowwas smashed by vandals six months before expiration of the tenant-landlord lease. The tenant, who was obligatedthereunder to effect and pay for repairs in such cases, promptly contracted with a window company to replace thewindow for $2,000, due 30 days after satisfactory completion of work. The landlord was then unaware of the tenant-window company contract. The window company was aware that the building was under lease, but dealt entirely withthe tenant.60 days after the window company's satisfactory completion of the window replacement, and prior to the expiration ofthe tenant's lease, the tenant, then insolvent, ceased doing business and vacated the building. In so d
